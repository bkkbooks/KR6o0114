body:
  text: 馬鳴菩薩造梁西印土真諦三藏譯明擕李沙門真界纂註先明論註題目次釋作者譯人名德也言大乘者大謂所乘之法乘謂能乘之人法具一心三大人通因人果人蓋以諸佛菩薩始則乘此大法信解自心而修大行終則乘此大法登涅槃岸到菩提鄉故知所乘即是能運能乘即是所運如是則大能運載一切至於究竟無有餘乘唯一佛乘故云大乘故下文云一切諸佛本所乘故一切菩薩皆乘此法到如來地故也所言起者謂大乘是能起之法信為所起之心蓋眾生能信自心體相良由理教大法所熏是則大乘有起信之功故云大乘起也故下文云有法能起摩訶衍信根所言信者謂大乘是所信之理信為能信之心是以能信大乘之理者則名大乘信也夫大乘信者謂信自心本來清淨本自具足本不生滅本來平等亦信自心具足性德能生萬法果如是信可謂大乘信矣是則依大乘而起信所起即大乘信故云大乘起信也不云解行者以信為解行之本今從其本以標題目故不云也所言論者集法議論也謂假立賓主自問自答往復徵析論量正理教誡學徒也然論有宗釋之異此即宗論謂馬鳴大士宗法華涅槃楞伽思益等百餘部實教大乘之所造故實為義豐文約無法不收故下文云如是此論為欲總攝如來廣大深法無邊義故應說此論則論為能詮之文大乘起信為所詮之義是則義由論顯論逐義名文義雙彰能所合目故云大乘起信論也言纂註者謂纂集疏記要義以釋此論也然疏記流布其來久矣今復纂之者蓋以賢首疏釋論疏各分而圭峯以為覧者不便即碎析疏文列於論下使論疏錯雜而章段不分雖則便於披覧又復困於支離而弗克見本論渾全之旨不無尋枝之厭故今聯合論文而分章段收束科目以為斷章復纂集要義隨文銷釋間有不符論旨者竊附己意此非論註各分以論下有註庶幾無尋文之倦而有得旨之歡然未敢自許達者儻不以人廢言幸為我一校其當否也言馬鳴者謂此菩薩初生之時感動諸馬悲鳴不已故云馬鳴言菩薩者具云菩提薩埵此云覺有情謂有智慧之覺餘緣慮之情即識情未盡覺行未圓故稱菩薩造者製作即佛滅度後六百年內所造言真諦者譯主之名以其學通三藏就德彰名故云真諦三藏譯者易也謂易梵天之語以成華夏之言故云譯也歸命盡十方最勝業徧知色無礙自在救世大悲者及彼身體相法性真如海無量功德藏如實修行等為欲令眾生除疑捨邪執起大乘正信佛種不斷故此歸三寶述造論意也然將造論先歸三寶者示學有所宗兼以請求加護也言歸命者明能歸三業蓋能歸之命總御諸根既以身命歸之則三業具矣言盡十方者明所歸分齊謂非直只歸一方三寶故云十方又非直一佛剎土十方乃至帝網剎中皆有十方無不歸命故云盡十方以顯歸心普徧也最勝業下明所歸三業即是佛寶以如來三輪業用超過一切故云最勝以最勝故故意業徧知身業無礙語業救世即如來法身大用也言徧知者謂若真若俗及世出世法無不盡知故云徧知言色無礙自在者謂一多大小真應報化隨機所見各各不同而不相障礙然於如來本無相無為故云色無礙自在言救世大悲者謂如來語業說法救濟眾生唯以悲心為本以是無緣之悲故云救世大悲者之一字結德屬人謂佛是徧知色無礙救世大悲者也及彼身下明所歸體相即是法寶以法有教理行果今所歸者即理法也蓋謂非但歸佛法身大用亦歸如來法身體相故云及彼身體相是則法身大用即是佛寶法身體相即法寶也此句是總下二句是別言法性真如海者謂心為萬法之本故云法性不妄不變故云真如體性深廣無有涯際故喻如海此即所歸體法也言無量功德藏者謂如來藏體能含藏無量性功德故故云無量功德藏此即所歸相法也言如實修行等者明所歸僧寶謂僧通凡聖今所歸者即地上大菩薩僧蓋地上菩薩證理起行行皆稱實故云如實修行以十地皆歸故云等也為欲下述造論意謂菩薩造論不為自求但欲眾生除疑捨執發起正信而佛種不斷故下顯示正義對治邪執意在此耳疑執若除信解自正則入如來種中正因相應故得佛種不斷也論曰有法能起摩訶衍信根是故應說說有五分云何為五一者因緣分二者立義分三者解釋分四者修行信心分五者勸修利益分明起說之益總標論本也夫聖人設教必有所益若無有益而說法者是所不應今此所說能令眾生除疑捨執起大乘信是故應說也所言有法者即一心三大等能起之法摩訶衍信根即所起大乘之信蓋眾生得起大乘正信者良由理教二法之所熏起是則大乘有起信之功故云有法能起摩訶衍信根也說有下總標論本夫說法者言不自起製必有由故受之以因緣分由致既興次宜略標綱要以為宗本故受之以立義分宗要既略次宜廣釋令物生解故受之以解釋分解既生已次宜依解起行故受之以修行信心分雖示行相鈍根懈慢次宜舉益勸修故受之以勸修利益分所言分者以章別餘段故稱為分然此五中初一是序分次三是正宗後一為流通也初說因緣分問曰有何因緣而造此論答曰是因緣有八種云何為八一者因緣總相所謂為令眾生離一切苦得究竟樂非求世間名利恭敬故二者為欲解釋如來根本之義令諸眾生正解不謬故三者為令善根成熟眾生於摩訶衍法堪任不退信故四者為令善根微少眾生修習信心故五者為示方便銷惡業障善護其心遠離癡慢出邪網故六者為示修習止觀對治凡夫二乘心過故七者為示專念方便生於佛前必定不退信心故八者為示利益勸修行故有如是等因緣所以造論此明造論因緣也初一句牒章問曰下問答總徵一者下別標總相所謂下釋成總義言因緣者即所由所以義也謂菩薩非為自求名利恭敬但欲眾生離分段變易二生死苦得菩提涅槃二無上樂所以造論斯為一論發起因緣故云因緣總相也二者下明說解釋分之所以謂眾生正解不發邪執日堅良由不達如來根本義故今欲解釋如來根本之義令諸眾生正解不謬故說解釋分也斯即向下顯示正義之文廣釋一心三大之義即解釋如來根本義也以如來得果皆乘此法故云如來根本若達此本則正解開發邪執自銷故云令諸眾生正解不謬三者下明說分別發趣道相所以謂菩薩為令善根成熟眾生於大乘中堪任住於不退之位而究竟佛果故分別發心修行進趣佛道之相四者下明說修行信心分所以謂菩薩為令善根微少眾生發四信心修五種行而成熟善根故說修行信心分也五者下明說禮懺方便所以謂菩薩為令業重障多善根難發眾生修禮懺法善護其心銷惡業障而違離癡慢出邪魔網故說禮懺方便六者下明說止觀方便所以謂菩薩為令凡夫二乘修習止觀對治心過而具足佛道故說止觀方便七者下明說專念方便所以謂菩薩為令怯弱欲退眾生專意念佛得生佛前必定不退信心故說專念方便已上三文備載修行信心分中八者下明說勸修利益分所以謂菩薩為懈慢眾生舉益勸修令其思惟修習至無上道故說勸修利益分也有如是下總結造論因緣蓋菩薩為眾生故發心造論故以一切眾生而為發起造論之因緣也然此八緣初一是總餘七別緣該括一論熟覧下文當自委悉問曰脩多羅中具有此法何須重說答曰脩多羅中雖有此法以眾生根行不等受解緣別所謂如來在世眾生利根能說之人色心業勝圓音一演異類等解則不須論若如來滅後或有眾生能以自力廣聞而取解者或有眾生亦以自力少聞而多解者或有眾生無自心力因於廣論而得解者自有眾生復以廣論文多為煩心樂總持少文而攝多義能取解者如是此論為欲總攝如來廣大深法無邊義故應說此論此明造論之意也問曰下躡上以問謂上文所示種種法門契經之中已具明矣何假重論答曰下約因緣不等以答謂契經之中雖已具明其如眾生根有利鈍不同心行有優劣不等而受解之緣亦有經論之殊詎可局一方便也哉所謂下釋成上義然將明因緣各別受解不同先明因緣無異領解齊等又將明假經假論之殊先明不假經論之別蓋如來在世眾生利根因無異也能說之人三業殊勝緣無異也謂色無障礙身業殊勝心能徧知意業殊勝音能具演語業殊勝以三業殊勝故法音歷耳異類等解尚不假結集之經何況須論此即不假經論而領解齊等也若如來滅後下正明因緣各別受解不同言能以自力無自心力因各別也於經於論緣各別也然於領解中有優劣之殊即受解不同也言或有眾生能以自力等者若據當文無自心力觀之則此言自力即自有心力也又據唐譯云無自智力心力即是智力蓋謂或有眾生能以自己心智之力廣覧諸經得解佛意者或有眾生亦以自己心智之力不假廣尋一聞千悟者此即利根心智優者於經領解然於領解中則前劣後勝也又或有眾生無自心智之力因於廣論而得解者自有眾生厭廣樂略則於略論悟佛旨者此即鈍根心智劣者於論領解然於領解中亦前劣後勝也是則因緣各別受解不同故脩多羅外不礙阿毗達磨也如是下結造略論之意蓋論主欲以少文而總攝如來廣大深法無邊之義以被最後之機故說此略論故海東疏云開二門於一心總括摩羅百八之廣詰摩羅即說楞伽經處以百八句答大慧菩薩百八問皆上句俗下句真同此二門示性淨於相染普綜逾闍十五之幽致逾闍國說勝鬘經處彼有十五章大義皆說染而不染同此生滅之真如義至如鶴林一味之宗涅槃經鷲山無二之趣法華經金鼓金光明經同性大乘同性經三身之極果華嚴瓔珞四階之深因大品大集曠蕩之至道日藏月藏祕密之玄門凡此等輩中眾典之肝心一以貫之者其唯此論乎既而宗旨深奧義理無邊有智之流請習無怠已說因緣分次說立義分摩訶衍者總說有二種云何為二一者法二者義所言法者謂眾生心是心則攝一切世間出世間法依於此心顯示摩訶衍義何以故是心真如相即示摩訶衍體故是心生滅因緣相能示摩訶衍自體相用故所言義者則有三種云何為三一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大能生一切世間出世間善因果故一切諸佛本所乘故一切菩薩皆乘此法到如來地故此立大乘法義為眾生起信之本也初二句結前生後言摩訶衍總說有二者標舉論本也云何下徵列論本所言下釋出法體謂此心體能任持自性軌生物解而顯三大義故名為法即眾生心也若隨染緣則生六凡諸世間法隨淨緣則起四聖出世間法故云是心則攝一切世間出世間法此即生滅門該攝一切若就真如門則融攝世出世法唯一真如更無異相也依於下標依一心顯三大義何以故下徵釋一心能顯三大所以謂何所以故唯依一心而能具示三大耶是心下釋成上義蓋以一心具有真如生滅二義若以心真如義則唯示體心生滅義能示三大故依一心而能具示三大也何以生滅能具示三大耶良以體唯自立相用必對染成而真如是絕相不起義非染非淨非生非滅平等一味而無差別故唯示體生滅是隨緣起動義能染能淨能聖能凡依業識事識則報應之用歷然翻恒沙妄染而功德之相宛爾故能具示三大也問真如是不起義但示於體者生滅是起動義應唯示於相用答真如是不起義不起不必由起立由無有起故唯示體生滅是起動義起必賴不起起含不起故於起中具示三大也所言義者下明三大義一者下標釋體大謂真如自體聖凡均等依正同然聖悟不增凡迷不減故云一切法真如平等不增減也以體性周徧故名體大二者下標釋相大謂如來藏體能具足無量功德故名相大即三如來藏中不空如來藏也三者下標釋用大謂如來報化二用能生一切眾生世出世善故名用大是則廣徧廣容而能普生善利故三皆稱大又體相用三各各充徧法界而不相障礙故皆稱大也上舉法義以明大義一切諸佛下舉因果以明乘義謂上文所示一心三大諸佛乘此而證涅槃菩薩乘此到如來地是知一心三大能運一切至無上道故云乘也已說立義分次說解釋分解釋有三種云何為三一者顯示正義二者對治邪執三者分別發趣道相顯示正義者依一心法有二種門云何為二一者心真如門二者心生滅門是二種門皆各總攝一切法此義云何以是二門不相離故總標解釋章門先明正義以為發起信解之本也初二句結前起後解釋下總標章門顯示正義下依一心法開二種門以釋立義分中是心則攝一切世間出世間法也夫心本是一而有真如生滅之不同者蓋以體具不變隨緣之義故也以不變故非生非滅離相離名淨染雙亡聖凡一致故有真如門也以隨緣故依正因果唯心轉變德相報用隨業現前故有生滅門也所言門者出入無壅開合自在之謂也何者謂如來藏心隨緣建立流出一切如門之開即生滅門也泯絕萬法融攝一切如門之合即真如門也或破或立隨心自在以其能破能立故二種門皆各總攝一切法也此義下徵釋二門各攝之意謂此二門皆各總攝一切法義云何以是下釋成上義蓋以真如是全生滅之真如生滅乃全真如之生滅故生滅門該攝一切法時真如既不離生滅則真如之理即攝在生滅門中而真如門融攝一切法時生滅由不離真如故生滅之法即攝在真如門中以是二門不相捨離故二門皆各總攝一切法也或謂二門既不相離則是二門共攝一切何云各攝耶答二雖不離二不並立如全一金而為眾像融眾像以成一金像顯而金自隱金成而像自滅由不並立而且為門不同攝法又別故各攝也心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本以來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如此明心真如義以釋立義分中是心真如也初一句牒章即是下直以法性標顯如體謂此心真如體融攝萬法為一法性故云即一法界此非算數之一為破諸數彊言一耳以一法性總攝萬法故云大總相法門如圓覺所謂大陀羅尼門也但彼約流出一切即是出義此約融攝一切即是入義蓋以法性能通諸法出入義言門耳即所謂無門之門無出入之出入也所謂下以心不生滅之義釋成如體一切下明諸法即真以成一法界義或謂現見諸法差別何云即一法界耶一切下釋也然法既依念有別離念無相得非一法界乎即所謂心若不異萬法一如也是故下牒上以明法本離相唯一真如耳蓋謂諸法若有差別之相則名言可施心有可緣矣以本無差別相故則一切名字言說分別之相亦本不可得故云一切法從本已來離名言相離心緣相也言畢竟平等者謂離差別相也無有變異不可破壞者謂離生滅相也以法無差別生滅相故則唯是一心故名真如以一切言說假名無實但隨妄念不可得故言真如者亦無有相謂言說之極因言遣言此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故當知一切法不可說不可念故名為真如釋離相所以復顯真離言相體無遣立以結不思議境也初二句釋離名言相所以次二句釋離心緣相所以蓋諸法唯真依妄差別因妄法故妄有名言則名言無實是故一切法離名言相亦因妄法妄有分別但隨妄念不可得故是故一切法離心緣相言真如下明言無言相或謂一切法既離言說相言真如者豈非言相耶答言真如者亦無有相謂言說之極因言遣言是則因差別之言故以真如之言遣言所遣若亡能遣亦不立故亦無言相也此真如下明體無遣立顯心法無二或謂上因差別之言故以真如之言遣言此依真如之體而有法可遣乎答此真如體無有可遣以一切法悉皆真故恐謂既無法可遣則有法可立故云亦無可立以一切法皆同如故是則言有差別可遣心法無二故無遣立也當知下舉不思議境結真如名言當知者欲人知法離相了法即真也不云離而云不可者欲人離言絕念以契入不思議境也然一切眾生從無始來執相迷性不能了法即真雖終日行而不自覺故今示真而約一切法也學大乘者須廢寢忘餐以思此事何曾是無聖凡依正空色等時何處真體不常顯現何有一法不是性為何有一法體不空寂又空法何曾得離真性苟或不同此說即墮斷常苟欲離法求真終無是處是故論中每節顯真皆言一切法也問曰若如是義者諸眾生等云何隨順而能得入答曰若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離於念名為得入設問答以明隨順得入真如之方也問曰下躡前以問謂若一切法不可說不可念者則發言違理動念乖真諸眾生等云何隨順而能得入答曰下以說念即無說念而答隨順以離心念而答得入也蓋一切諸法從本已來離言說相離心緣相不知此者則滯說念而乖無念不名隨順也知法離相者終日說念而無能說可說亦無能念可念則不滯說念而順於無念故名隨順矣若於說念直下離念即得契彼無念故云若離於念名為得入此即說默無礙動靜一如正所謂能善分別諸法相於第一義而不動則無不定時故名證入此上明離言真如顯觀智境下明依言真如顯信解境也復次真如者依言說分別有二種義云何為二一者如實空以能究竟顯實故二者如實不空以有自體具足無漏性功德故此依言辨相以釋立義分中是心真如相也初一句牒章不牒相者略也又相不離體故唯云真如言依言說分別有二義者謂前則離言辨體故云即一法界此則依言辨相故云有二種義義即相也以真如體離妄染故云空體具性德故云不空空與不空俱就體顯故以言辨相即示體也云何下徵起略釋二義言如實空者謂能究竟遠離不實之相顯真實體故是則如實之中空無妄染故云如實空非謂如體自空也此取唐譯論文以解以唐譯究竟之下有遠離不實之相顯實體言故取釋之二者下標釋不空言有自體者異妄無體故此則自體不空也言具足無漏性功德者異恒沙煩惱故是則如實之中雖空無妄染而能具足無漏性德故佛性論云由客塵空故與法界相離無上法不空與法界相隨此則德相不空也所言空者從本已來一切染法不相應故謂離一切法差別之相以無虗妄心念故當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相乃至總說依一切眾生以有妄心念念分別皆不相應故說為空若離妄心實無可空故此廣釋空義以明依妄說空離妄無空也所言下總釋空義言一切染法不相應者謂如實之中虗妄心境及有無一異等以至一切眾生所有妄心念念分別皆與真如不相應故故云一切染法不相應也謂離下別釋空義謂離一切法差別之相者無境界相也以無虗妄心念者無業轉相也蓋以離心則無境界之相故無虗妄心念則離一切法差別之相當知下謂真如自性本離四句亦絕百非故非有無一異等相蓋以有無一異等執差別相皆依虗妄心念而有離諸妄念則無故真如離上諸相即離虗妄心念及執差別相也乃至下以諸眾生妄心分別量過恒沙不能悉舉故復云乃至總說依一切眾生以有妄心念念分別皆不相應斯言有無一異等外盡諸眾生所有妄心分別計執皆與真如不相應矣言故說為空者結成空義也若離下明空相亦空謂空不自立依妄而立若離妄心則空亦叵得故唐譯云妄念非有空性亦空以所遮是無能遮亦無故故云實無可空也所言不空者已顯法體空無妄故即是真心常恒不變淨法滿足則名不空亦無有相可取以離念境界唯證相應故此明不空之相無相唯證相應也言已顯法體等者即前空處顯不空體相也以法體空無妄處即是真心常恒不變故斯即自體不空淨法滿足即性德不空蓋以真心四相不遷三際莫易故云常恒不變相離妄染德無不足故云淨法滿足故下文云如是淨法無量功德即是一心更無所念是故滿足則名不空者結成上義也言亦無有相可取者謂上來說空實無可空此言不空亦無有相可取例上而言故云亦也蓋無量功德之相乃即性之相本自無相豈有相而可取乎何以無相可取耶以離念下釋無相可取所以謂性德之相既本自無相則妄念不能緣故名離念境界此離念境界唯智與理冥境與神會者相應故無有相可取也心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿棃耶識此明心生滅義以釋立義分中是心生滅也初一句牒章依如來下標釋生滅言依如來藏故有生滅心等者如來藏即不生不滅心眾生從無始來由不覺此即不生不滅動作生滅此即如來藏隨緣全體動作生滅故釋云不生不滅與生滅和合然實無二體以迷真成妄約迷言依合耳不同依母有子子與母合二體別也言非一非異者謂如來藏隨緣而其體不變故非一也不變而能隨緣故非異也體不變故治道染相滅而真體不滅能隨緣故不生滅體而動作生滅也名為阿棃耶識者結成生滅心也梵語阿棃耶義翻為藏謂具三藏義故三藏謂能藏所藏我愛執藏言能藏者謂能藏諸法於自體故此則識為能藏所藏者謂藏識體於諸法故此則識為所藏我愛執藏者謂有情執第八見分為自內我故名我愛執藏也此識有二種義能攝一切法生一切法云何為二一者覺義二者不覺義所言覺義者謂心體離念離念相者等虗空界無所不徧法界一相即是如來平等法身依此法身說名本覺此依識標舉二義先明覺義也言二義能攝一切法生一切法者蓋以迷時依本覺故而有不覺依不覺故即起麤細一切染法如是則迷真成妄淨滅染生而起六凡法也悟時依不覺故而起始覺由始覺故遂能翻破四相以成四位如是則破妄顯真淨生染滅而起四聖法也是知二義能生聖凡染淨一切諸法故云能攝一切法生一切法所言覺義者覺謂覺體義即覺相謂心體離念釋本覺體下云一切眾生未離念故不名為覺則知離念名為覺也離念相者下釋本覺相謂覺體無相而以周徧一相為相故云無所不徧法界一相即無相之相也即是下指離念相是佛法身結名本覺以顯所釋覺義非始覺義也何以故本覺義者對治覺義說以始覺者即同本覺始覺義者依本覺故而有不覺依不覺故說有始覺又以覺心源故名究竟覺不覺心源故非究竟覺徵明說本始之所由即總標因果二覺以明還滅之義也初一句徵前說名不同之意謂何所以故牒釋覺義而結名本覺耶本覺下釋前說名不同之意謂始覺新生本覺本有以前對始覺之義故結名本覺以本覺未起不覺之時始即同本始本未分故唯牒釋覺義也然結名本覺意有二焉一為顯所釋覺義非始覺義二為欲發起始覺以明還滅之義故結本覺也始覺義者下明說有始覺之由蓋以不覺依本覺而有始覺假不覺而生則聖凡染淨由是而發起也又以下標因果明還滅之義言覺心源故名究竟覺者謂始覺覺盡念相得見心性名覺心源以心為諸法之本如源為萬派之根故云心源能覺此心源者即階佛果名究竟覺其不覺心源者但得隨分相似等覺故非究竟覺也然此中若約心生滅義應先明生起今就覺不覺二義之便故先依覺義以明還滅次依不覺始明生起也此義云何如凡夫人覺知前念起惡故能止後念令其不起雖復名覺即是不覺故自此已下明所覺四相不同即釋成前因果二義也初一句徵前二義謂此覺心源故名究竟覺等義云何如凡夫下明覺滅相謂此信位中人信業果報必無差忒故知前念起惡而能止後念令其不起念既不起豈造惡業耶此則於六麤中離起業相於四相中覺滅相也言滅相者以無明力轉彼淨心至起業相行相最麤極至於此周盡之終故名滅相不配業繫苦相者謂報由業招業因若離苦果自息故不配耳雖復下謂雖覺所起惡念而不知念相即空故雖覺而即是不覺也如二乘觀智初發意菩薩等覺於念異念無異相以捨麤分別執著相故名相似覺此明覺異相也謂二乘觀智三賢位人大小雖殊同覺異相斯蓋就其同處而與二乘同一位論以舉初住而等後位故云初發意菩薩等即三賢位也言覺於念異念無異相者謂始覺覺其動念之上種種執計本不可得則動念上計執之相當下銷亡故得念無異相以執計不一故名為異即於內執我外執我所及分別人我計著名言隨逆順緣起貪瞋等即此相也以捨下謂既無異相即捨麤分別執著相矣以捨此相故名相似覺蓋由未證真如但捨麤執與覺相似名相似覺如法身菩薩等覺於念住念無住相以離分別麤念相故名隨分覺此明覺住相也謂初地至九地皆親證真如依真如法為自體故名法身菩薩舉初等後故云等也言覺於念住念無住相者即覺智等四相名住相也蓋智相於諸法上任運分別相續則念念分別無有間斷此二即住著外境以法執堅住故名為住能見能現之二即不了二相無體住於見相耳今始覺覺其動念之上四種住相本無自性則其四相隨照俱亡故得念無住相斯即初地覺相續相乃至九地覺能見相也以離下謂既無住相即離分別麤念相矣由異前麤故但云分別異後細故名麤念相以離分別麤念之相故名隨分覺蓋謂雖證真如猶未究竟各隨其分而覺了故名隨分覺已上三相即釋前不覺心源非究竟覺蓋以所覺淺深雖異俱未覺了心源皆非究竟此下即釋前究竟覺也如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺此明覺生相也謂十地菩薩所修所斷悉皆究竟故云滿足方便言方便者謂理無修斷凡修斷者皆方便耳以得無念之覺故云一念相應此即總明究竟覺義下即別明亦是釋成上義言覺心初起心無初相者即覺生相也以此相之先無有念相故名生相又前依動念而覺故云念無異相等此依心體而覺故云心無初相即是始覺覺心體上本無初起之相則其生相至此銷亡故得心無初相也以遠離下謂既無初相即是遠離微細念相此即釋上滿足方便以離念故得見心性以無生滅心即常住此即釋上一念相應是則念相都盡覺了心源始即同本無始本異名究竟覺此有三義故稱究竟一斷究竟即遠離微細念相二證究竟即得見心性心即常住此二既備即位究竟矣是故脩多羅說若有眾生能觀無念者則為向佛智故又心起者無有初相可知而言知初相者即謂無念是故一切眾生不名為覺以從本來念念相續未曾離念故說無始無明先顯離念名覺次明有念不名為覺也言是故者牒上之辭以是離念名究竟覺故脩多羅說若有眾生能觀心體無有念相者則為向於佛智若是則苟能直下無念即得入於佛智矣豈非離念名為覺耶是則能觀能向即始覺所觀所向即本覺也又心起下重釋上文亦顯離念名覺之義言心起者即覺心初起也言無有初相可知者謂始覺覺心體上本無初起之相故無有初相可知既無初相可知何云地盡能知初相而言知初相者即是知心體上無有初相非謂有初相可知既無初相即謂無念是則知心無念即名為覺矣以是無念名為覺故則顯一切眾生不名為覺以從下釋不名為覺所以蓋以眾生從本已來念念相續未曾離念說為無始無明故不名為覺也若得無念者則知心相生住異滅以無念等故而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故此明覺心源者知念無自相等同一覺也若得下謂得無念者則知四相皆悉無相故等同無念此即所謂入無生者方知剎那也雖知四相而實無有始覺之異何以無始覺異以四相下釋無異所以謂未窮源者則四種相隨位淺深覺有前後故有始覺之異得無念者知彼四相一心所成無有前後亦無自體本來平等同一覺故則無四相之異故無始覺之異此顯覺心源者唯有一覺更無能所之異也復次本覺隨染分別生二種相與彼本覺不相捨離云何為二一者智淨相二者不思議業相智淨相者謂依法力熏習如實修行滿足方便故破和合識相滅相續心相顯現法身智淳淨故此總標始覺生起之相先明智淨相也言本覺隨染分別等者謂本覺之體本自離念亦無有相只因不覺念相橫生由是依不覺故而起始覺遂能覺心離念顯本覺體翻染成淨生智淨相依智相故隨機所見有不思議業相故云隨染分別生二種相也此二種相約業用則報化不離法身約智相則德相不離覺體故云與彼本覺不相捨離云何下徵列二相言智淨相者謂依本覺理法內熏真如教法外熏領彼聞熏益性解力因知覺體本自離念自性本來清淨遂修唯識無塵之行遠離前境此即地前依教熏修故云依法力熏習以熏習故得如實而知無前境界以如實知故即隨順法性廣修諸行故云如實修行即地上行也至滿足方便則破和合識內不覺之相顯現法身滅業轉等相續之相智性淳淨名智淨相蓋以迷時覺與不覺二法和合業轉現等相依而生不相間斷今以始覺之功破不覺相顯本覺法身惟有本覺之性而無不覺之相故云破和合識相滅業轉等六染之相智性淳淨則無相依不斷之相故云滅相續心相也此義云何以一切心識之相皆是無明無明之相不離覺性非可壞非不可壞如大海水因風波動水相風相不相捨離而水非動性若風止滅動相則滅濕性不壞故如是眾生自性清淨心因無明風動心與無明俱無形相不相捨離而心非動性若無明滅相續則滅智性不壞故徵釋滅相顯性之義以明相壞而性不壞也初一句徵起上義謂此滅相顯性之義云何以一切下釋成上義謂心即相續心即六染也識即和合識即阿棃耶識也此心識妄動之相悉依不覺而成故皆是無明亦悉由轉彼淨心而有故不離覺性則知心識由覺與不覺二法合成也言非可壞非不可壞者以心識妄動之相皆是無明故非不可壞故前文云破和合識相滅相續心相也以心識不離覺性故非可壞是則相可壞而性不可壞故心識之相滅而法身淳淨之智顯也如大海下引喻重顯如是眾生下以法合明水喻淨心風喻無明波動喻業等相續是則風水不離能生波相雖然以水性不動故風息波澄而濕性不壞以況心與無明雖二法和合能生業轉等相以心性不動故迷息動亡而智性不壞也不思議業相者以依智淨相能作一切勝妙境界所謂無量功德之相常無斷絕隨眾生根自然相應種種而現得利益故此牒釋不思議業相也言不思議業相者謂諸菩薩依佛智相而見身色相好依報莊嚴各各無量故云依智淨相能作一切勝妙境界乃機自作也然勝妙境界即所謂身有無量色色有無量相乃至所住依果亦有無量種種莊嚴隨其所應常能住持不毀不失故云無量功德之相常無斷絕然於至用無為智相無相不妨隨根受益稱機現相弗可以有無思議故名不思議業相也復次覺體相者有四種大義與虗空等猶如淨鏡此引喻重明覺體四相也言復次者謂覺體四相前已具辨此復重明故云復次言有四種大義等者謂本覺體具離相現相朗然照物四種義故喻如淨鏡一一義相皆徧法界故云與虗空等是則空喻大義鏡喻四相也然此雙舉二喻者謂單舉空喻則不顯四義單舉鏡喻則不顯大義故雙舉二喻互相顯發耳然下四鏡文中四義則顯徧義不彰文雖不言義亦具矣言鏡喻四相者一空鏡謂離一切相二不空鏡鏡體不無能現萬像三淨鏡謂磨治離垢四受用鏡置之高臺須者受用又前二自性淨約因隱時說後二離垢淨約果顯時說也云何為四一者如實空鏡遠離一切心境界相無法可現非覺照義故總徵別釋如實空鏡也言如實空鏡者謂如實之中離心境相無法可現如明鏡中本無諸相亦無可現故云如實空鏡言非覺照義故者結釋如實空義謂如實空鏡是空寂義非覺照義故離心境之相而無法可現覺照則有法可現如鏡照物即有緣可現矣二者因熏習鏡謂如實不空一切世間境界悉於中現不出不入不失不壞常住一心以一切法即真實性故又一切染法所不能染智體不動具足無漏熏眾生故此標釋因熏習鏡也言因熏習鏡者謂依不空體相為內因熏也此有二義熏如實下即第一義蓋如體不空中現一切世間境界心雖現境全境即心實無能所故無出入亦無失壞常住一心以一切下釋成法即心義此如鏡體不空中現萬像鏡雖現像全像是鏡故亦無出入及與失壞依此不空體相恒常熏習故令眾生了法即真契如實理如以鏡像恒常熏習令人了像本空悟如實鏡也又一切下是第二義謂智體不動不為染法所染而能具足無漏德相如鏡體不動不為垢穢所染而能具足眾相依此不動體相恒常熏習故令眾生覺悟無常而厭生死苦樂求涅槃如以鏡相恒常熏習令人覺知顏貌變遷而棄假求實是則前以如實為體境界為相相即是體故為內熏此以本智為體功德為相相不異體亦為內熏即下所謂自體相熏習也三者法出離鏡謂不空法出煩惱礙智礙離和合相清淨明故此標釋法出離鏡也言法出離鏡者謂真如法由始覺之功出障離垢智明淳淨猶如明鏡由磨治離垢光明朗然故云法出離鏡即前智淨相也四者緣熏習鏡謂依法出離故徧照眾生之心令修善根隨念示現故此標釋緣熏習鏡也言緣熏習鏡者謂依前真如出障離垢慧光圓明故能徧照眾生之心如鏡離垢故能明鑑萬物雖以光明徧照本自無為雖能鑑物而本寂無作然不妨隨機大小而所見所聞各各不同如鏡隨人妍醜亦現像各別故云令修善根隨念示現是則真如大用為眾生外緣熏習故云緣熏習鏡即前不思議業相也上明還滅義竟所言不覺義者謂不如實知真如法一故不覺心起而有其念念無自相不離本覺猶如迷人依方故迷若離於方則無有迷眾生亦爾依覺故迷若離覺性則無不覺以有不覺妄想心故能知名義為說真覺若離不覺之心則無真覺自相可說此明依覺起不覺待不覺以說覺也初一句牒章謂不如實下釋相葢真如本覺平等無二知則名覺覺即離念以不如實知名為不覺由不覺故動念妄生是則依覺而起不覺依無念而起念也然此不覺動念由依本覺而生故念無自相不離本覺猶如下引喻以明眾生下以法合顯方喻覺性迷喻不覺餘文可知以有下明待不覺以說真覺然論文大意明覺與不覺相依而立無有自相皆不可得故唐譯云然彼不覺自無實相不離本覺復待不覺以說真覺不覺既無真覺亦遣即所謂言妄顯諸真妄真同二妄也復次依不覺故生三種相與彼不覺相應不離云何為三一者無明業相以依不覺故心動說名為業覺則不動動則有苦果不離因故二者能見相以依動故能見不動則無見三者境界相以依能見故境界妄現離見則無境界上明依覺起不覺此明依不覺生三相也言無明業相者謂依不覺真如而心妄動說名為業蓋指動作名為業也言覺則不動者反舉釋成謂若覺真如即無動念是知今動只由不覺言動則有苦果不離因者此指為因名為業也謂二種生死之苦皆由動念而成則業相為苦果之因故云果不離因二者下謂能見由依動念而有故不動則無境界即依能見而有故離見亦無則知此三說雖先後起即相依故與不覺相應不離由不離故無明若滅此三即滅故前云若無明滅相續則滅言相續者蓋指此業等三相相依而生不相間斷故云相續也以有境界緣故復生六種相云何為六一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂覺心起念相應不斷故三者執取相依於相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別假名言相故五者起業相依於名字尋名取著造種種業故六者業繫苦相以依業受報不自在故當知無明能生一切染法以一切染法皆是不覺相故此徵釋緣生之相而結末歸本也初二句躡前總標云何下徵釋六相當知下結末歸本言智相者謂於先所現境不了虗妄於無相中妄生分別逆順之相故名智相相續相者謂於先所分別順愛之境心生喜樂逆不愛境心生憂苦逆順苦樂念念相應而不間斷名相續相執取相者謂於先所緣念逆順之境住持苦樂之心不了虗無深生取著名執取相計名字相者謂依先所執取虗妄心境分別假名言相云計名字相上來四相若配我法二執前二法執後二我執若配惑業苦三四相皆屬於惑下二即業苦二相也起業相者謂於先所分別假名言相尋名取著發動身口造種種業名起業相業繫苦相者謂依先所造善惡等業受苦樂等報輪迴三界長縛生死不自在故名業繫苦相已上九相雖麤細不同心境各別皆因根本無明不了真如而起故云無明能生一切染法以一切下轉釋無明生法所以蓋以三細六麤總攝一切染法染法雖多皆是不覺差別之相故知染法皆由無明而生也明生起義竟復次覺與不覺有二種相云何為二一者同相二者異相同相者譬如種種瓦器皆同微塵性相如是無漏無明種種業幻皆同真如性相是故脩多羅中依於此義說一切眾生本來常住入於涅槃菩提之法非可修相非可作相畢竟無得亦無色相可見而有見色相者唯是隨染業幻所作非是智色不空之性以智相無可見故異相者如種種瓦器各各不同如是無漏無明隨染幻差別性染幻差別故此引喻以明覺與不覺同異之相也復次下總標二相云何下徵列二相同相下引喻釋成二相言同相者譬如瓦器雖精麤各別然其本性與相不異微塵以況本覺無漏與無明有漏種種相用雖染淨不同然其性相皆同真如故云同相也以是染淨相用皆同真如故契經之中依此同義說眾生本入涅槃菩提非可修得用相亦無可見故淨名經云一切眾生即涅槃相不復更滅首楞嚴云勝淨明心本周法界不從人得何藉劬勞肯綮修證圓覺經云彼圓覺性非作得故般若經云無智無得又經云佛果無有色聲功德唯如如及如如智獨存既無色聲功德而有見色相者唯隨眾生染業幻力所作非智性而有色相可見以智相無可見故異相下先以喻明異次以法合顯言瓦器種種不同者以況染淨相用各各差別也言隨染幻差別者謂無量淨功德相皆隨翻染所成故前云滅相續心相生智淨相下云若心有動具有過恒沙等妄染之義對此義故心性無動則有過恒沙等諸淨功德相義示現此就德相以明隨染幻差別若就業用雖智相無有可見而隨眾生染業幻力所見自有報應之色相不同故前云隨眾生根自然相應種種而現得利益也言性染幻差別者謂三細六麤一切妄染皆由無明迷平等理而生是故其性自是差別故下文云真如本一而有無量無邊無明從本已來自性差別故云性染幻差別也復次生滅因緣者所謂眾生依心意意識轉故此義云何以依阿棃耶識說有無明不覺而起能見能現能取境界起念相續故說為意此明生滅因緣之義以釋立義分中是心生滅因緣也初一句總牒前章所謂下別明生起因緣言生起因緣者謂本覺為因不覺為緣此二和合生起意及意識以約眾生說生起故故云眾生依心意意識轉轉者起也此義下徵起上義謂此依心有意意識轉義云何以依下釋成上義問前云依覺有不覺何此云依棃耶有無明耶答棃耶識體即如來藏則此云依棃耶有無明即依如來藏有無明故不相違也言不覺而起者謂依不覺故而心妄起起即是動動即業相能見能現即轉現二相能取境界起念相續即智相相續相故說為意總結上義不言意識者具在後文是則依覺有不覺依不覺發起三細四麤故云眾生依心意意識轉也然此依棃耶說有無明而上唯云依心者文影略耳蓋單真不生必真妄和合意方得生故上云依心而此云依棃耶有無明也此意復有五種名云何為五一者名為業識謂無明力不覺心動故二者名為轉識依於動心能見相故三者名為現識所謂能現一切境界猶如明鏡現於色像現識亦爾隨其五塵對至即現無有前後以一切時任運而起常在前故四者名為智識謂分別染淨法故五者名為相續識以念相應不斷故住持過去無量世等善惡之業令不失故復能成熟現在未來苦樂等報無差違故能令現在已經之事忽然而念未來之事不覺妄慮是故三界虗偽唯心所作離心則無六塵境界此詳明五意結歸一心也初一句總標五名云何下徵釋五相言業識者謂由無始無明不覺真如而心妄動名為業識依於動心轉成能見名為轉識依於能見現一切境猶依明鏡現於色像名為現識蓋以鏡不自現對像而現如心不自現對境即現故云隨其五塵對至即現無有前後也然由心現境實通一切言五塵者且舉麤顯以合色像耳以一切下釋成對至即現所以蓋此現識於一切時任運而起不同六七二識有時間斷云常在前以其常在前故對境即現已上三相皆屬本識故名為細自此已下屬於事識故名為麤言智識者謂於染淨之法任運分別名為智識此即俱生法執相續識者謂分別之心與染淨之法念念相應無有間斷名相續識此約自體相續即分別法執住持下約令他相續謂過去無量世等善惡之業皆由此識起惑潤之令住持不失此則煩惱能潤已熟之業不失如水潤種不令焦亡也又現在未來苦樂等報未成熟者復由此識起惑潤之令其成熟無有差違此則煩惱能潤未熟之業令熟故能成熟苦樂等報無差違耳然此事識非唯能令三世業果成熟無失亦復能令已經未來三世之事念慮不亡故名相續識也是故下結歸一心以是動心能成三世善惡業報故故說三界虗偽唯心所作言虗偽者以三界之相由動心所作故虗而不實偽而不真也三界既唯心作若離動心則無六塵境界矣然順結生起但言三界反結還滅唯云六塵綺互言耳實則生滅皆通一切也此義云何以一切法皆從心起妄念而生一切分別即分別自心心不見心無相可得當知世間一切境界皆依眾生無明妄心而得住持是故一切法如鏡中像無體可得唯心虗妄以心生則種種法生心滅則種種法滅故此徵釋生滅之義以明諸法由心生滅也初一句徵前生滅之義謂此依心作境離心無境之義云何以一下釋成上義謂諸法不能自生皆從心念而生故云三界虗偽唯心所作諸法既從心生則一切分別即分別自心故經云自心取自心也既分別法即分別心若不分別心則無相可得故云離心則無六塵境界由是而知世間一切境界皆依無明力而任持託業識而安住故云皆依眾生無明妄心而得住持以是法依妄心而住持故則法無自性故喻云如鏡中像無體可得既無體可得則知諸法唯心妄有也何以諸法唯心妄有耶以心生下釋唯心妄有所以結成生滅蓋以心生法生心滅法滅故知諸法唯心妄有而無體可得也復次言意識者即此相續識依諸凡夫取著轉深計我我所種種妄執隨事攀緣分別六塵名為意識亦名分離識又復說名分別事識此識依見愛煩惱增長義故此即前識以明意識也所言意識者謂即前識依諸凡夫取著計執隨事攀緣分別六塵故名意識即意之識耳言取著轉深等者謂前則不了法空妄生分別此則非唯不了法空而復於內計我外計我所或即蘊離蘊種種妄執是知前唯執法此復執我故云取著轉深而於六麤中即執取計名字相也言分離識者謂前就一意分別六塵約能分別名為意識此依六根別別取境約所分別故名分離識也又復說名分別事識者謂前二多就緣現境言此能通緣三世及內外種種事相故名分別事識此識下依惑結成事識蓋以此識依見思惑熏習增長故名事識故下文云所起見愛熏習以能成就分別事識義故則知五意皆依根本無明熏習而生故五意與意識各別言也然此依惑結成意有二焉一為顯意識非根本無明熏習而生二生起因緣既明為欲發起還滅因緣故依惑結也依無明熏習所起識者非凡夫能知亦非二乘智慧所覺謂依菩薩從初正信發心觀察若證法身得少分知乃至菩薩究竟地不能盡知唯佛窮了此舉所覺明能覺之不同略顯還滅因緣也言還滅因緣者謂本覺內熏為因師教外熏為緣因緣具足始能發解造修破惑入道文不言者前二相四鏡中已略明故依無明下舉所覺明凡小非分謂依見思惑熏起之識凡小可以知覺依無明惑熏起之識乃五意識此是三賢十聖觀察而斷者故不能知覺也謂依下明信相應地發心觀察謂三賢菩薩從初正信知真本有達妄本空由是發心修習唯識無塵之觀觀察唯識故云從初正信發心觀察也若證下明地上分知唯佛窮了謂地上菩薩親證法身破無明惑斷相續識等故得隨分而知乃至業識則究竟地亦不能盡知故唯佛窮了然此但云了知而不言遠離者以知幻即離故文雖不言義必具足也何以故是心從本已來自性清淨而有無明為無明所染有其染心雖有染心而常恒不變是故此義唯佛能知所謂心性常無念故名為不變以不達一法界故心不相應忽然念起名為無明徵明難知所以即釋不變無明二義也初一句徵起前義謂何所以故此識唯佛能知耶是心下釋難知義謂心性本淨由不覺此即有無明既為無明所染有其染心即所謂不染而染難可了知也雖有染心而此清淨真心常恒不變即所謂染而不染亦難可了知也是故下結能知人蓋以不染而染染而不染之義甚深微細難解難知故地盡不能盡知唯佛能知也所謂下解釋不變無明二義言不變者謂心性清淨恒無念故名為不變言無明者謂若達法界則與真心相應而心不妄動非無明矣以不達一法界故則與心不相應不覺念動名無明也染心者有六種云何為六一者執相應染依二乘解脫及信相應地遠離故二者不斷相應染依信相應地修學方便漸漸能捨得淨心地究竟離故三者分別智相應染依具戒地漸離乃至無相方便地究竟離故四者現色不相應染依色自在地能離故五者能見心不相應染依心自在地能離故六者根本業不相應染依菩薩盡地得入如來地能離故不了一法界義者從信相應地觀察學斷入淨心地隨分得離乃至如來地能究竟離故此詳示依位離惑染相廣明還滅因緣也言執相應染者謂依妄境執計橫生心境相應染污淨性名執相應染此即前意識也以此六染即前五意及意識故依二乘下謂二乘解脫三賢位人大小雖殊同離意識同斷見思故能遠離執相應染言信相應者謂十解已去信根成熟無有退失名信相應言不斷相應者謂由不了法空妄生分別心法相應緜然無間名不斷相應此即五意中相續識也依信相應下謂十解已去修習唯識無塵等方便了法唯識知無前境故能漸捨法執分別至淨心地離前境相法執分別永不現行故得究竟遠離不斷相應染也言分別智相應者謂於染淨法中麤分別執雖無俱生細惑猶在則於境界尚有微細分別名分別智相應此即五意中之智識也依具戒下謂七地已還法空觀有間則有出入觀異故於境界而有微細分別然地地分除故云漸離蓋八地已去無出觀緣境之異則於七地盡此惑矣故云無相方便地究竟離也言具戒者以離垢地具三聚戒故云具戒無相方便者謂八地無相無方便功用七地無相觀有加行方便有功用故故云無相方便也言現色不相應者即是現識謂此現識雖能現境然未起分別則心與境猶未相應名不相應依色下謂八地菩薩離現識已得三種世間隨心相作無有障礙名色自在故經云能以佛身作眾生身亦作國土身等既依色自在地能離現識反顯色不自在者則現識未亡也言能見心不相應者即是轉識謂此能見未現境故有見無境名不相應依心下謂九地菩薩離能見已善知眾生心煩惱等十種稠林故云心自在地此於他心得大自在又以自得四十種無礙智故善說法要廣化眾生云心自在於於自心得大自在既依心自在地能離轉識反顯心不自在者則轉識未亡也言根本業不相應者即無明業識謂由不了真如而心妄動名根本業未有見相名不相應依菩薩下謂盡地菩薩離業識時即入佛地故云盡地得入如來地能離非得佛後始離如前云唯佛窮了亦菩薩盡地知業識時即入佛地故云唯佛窮了亦非得佛後方了下云根本無明至如來地究竟離者亦此意也是知十地滿心與如來地義說為二體無二矣不了下明依位離無明相謂根本無明始從地前觀察學斷登地分離至如來地究竟離也然則六染無明說雖前後治滅並在一時蓋以六染皆以無明為根本即無明差別之相是故離六染時即離無明離無明時即離六染故無前後但不覺與動作二義不同故分為二是以下文為礙障智之相亦不同也言相應義者謂心念法異依染淨差別而知相緣相同故不相應義者謂即心不覺常無別異不同知相緣相故此牒釋前相應不相應義也言相應義者謂能緣之心與所緣之法心法各異而依染淨差別法中能知所緣二相是同斯則即異而同故云相應所言同者謂心緣染法即作染解心緣淨法即作淨解心法同故名相應也言不相應義者謂真心不覺念動之時雖能現境尚未緣境分別則有境無心故云常無別異不同前知相緣相同故名不相應也又染心義者名為煩惱礙能障真如根本智故無明義者名為智礙能障世間自然業智故此義云何以依染心能見能現妄取境界違平等性故以一切法常靜無有起相無明不覺妄與法違故不能得隨順世間一切境界種種知故此示染心無明為礙障智之相不同也又染心下示六染為礙障理智義謂六種染心是為能障真如本智即是所障蓋以染心諠動故礙本智染相差別故障真如是則六染煩動惱亂湛性故名六染為煩惱礙能障真如根本智也無明下示無明為礙障量智義謂根本無明是為能障世間業智即是所障蓋以無明昏迷能障量智由障智故不能得隨順世間境界種種而知故目無明名為智礙能障世間自然業智也言自然業智者謂世間境界任運而知不待擬心名自然業智此義下徵釋前義謂此二礙障智之義云何以依下釋煩惱障理智義言染心能見能現即三不相應染妄取境界即三相應染謂此六染能所差別違於真如妄取境界礙於本智是則染心妄取違平等性故障理智也以一切下釋無明障量智義言一切法常靜無起等者謂諸法恒靜無有起滅故經云諸法本來常自寂滅由無明故不了如法寂靜則妄見起滅故與法乖違以違法故不能隨順世間一切境界種種而知是故無明能障世間自然業智也復次分別生滅相者有二種云何為二一者麤與心相應故二者細與心不相應故又麤中之麤凡夫境界麤中之細及細中之麤菩薩境界細中之細是佛境界此二種生滅依於無明熏習而有所謂依因依緣依因者不覺義故依緣者妄作境界義故若因滅則緣滅因滅故不相應心滅緣滅故相應心滅此明生滅之相以釋立義分中是心生滅相也以相不離生滅故帶生滅言之復次下牒前標數云何下徵釋二相言與心相應故者釋成麤相謂三相應染以於外境分別執計則有外境與心相應故名為麤言與心不相應故者釋成細相謂三不相應染雖依動心現境猶未起心分別則境界與心不相應故名為細此約麤細略明其相也又麤中下復就所覺麤細詳明其相蓋三相應染俱名為麤而執相應染復更為麤故云麤中之麤三賢位人能覺此染故云凡夫境界麤中之細下謂不斷及智相應二染是麤中之細能見能現二不相應染是細中之麤十地已還能覺此染相云菩薩境界根本業不相應染能所未分行相極細故云細中之細唯佛能了故云是佛境界此二種下標起麤細生滅之本言二種生滅依無明熏習有者謂麤細之相元依根本無明熏習而生還依無明而滅若生若滅不離無明故云二種生滅依無明有也所謂下釋成麤細生滅之義言不覺義故者釋成因義即無明為因生三細也言妄作境界義故者釋成緣義即境界為緣長六麤也言若因滅則緣滅者謂境界之緣元依無明因生無明之因若滅則境界之緣亦隨滅矣因滅故不想應心滅者謂三不相應心親依無明因生故無明滅時此三隨滅緣滅故相應心滅者謂三相應心親依境界緣生故境界滅時三亦隨滅即所謂從因緣而生亦從因緣而滅故二種生滅皆依無明有也問曰若心滅者云何相續若相續者云何說究竟滅答曰所言滅者唯心相滅非心體滅如風依水而有動相若水滅者則風相斷絕無所依止以水不滅風相相續唯風滅故動相隨滅非是水滅無明亦爾依心體而動若心體滅者則眾生斷絕無所依止以體不滅心得相續唯癡滅故心相隨滅非心智滅設問答以明心相滅而心體不滅也問曰若相應不相應心滅者即無有體六染之心云何相續此即迷相為體問若六染之心相續不滅者云何治道說相應不相應心究竟滅此即疑相不滅問答曰所言相應不相應心滅者唯心相滅故無明動相究竟滅此答次問非心體滅故六染之心相續不滅此答初問即所謂但除其病而不除法故得五陰六入等皆如來藏妙真如性也如風下引喻以明風喻無明水喻心體動相喻六染蓋謂風依於水而有波相若水體滅者則風之波相斷絕無所依止以水不滅風之波相相續唯風滅故波相隨滅非水滅也無明下以法合顯無明合風心體合水眾生合風相即六染之心也蓋謂無明依心而有染相若心體滅者六染之心斷絕無所依止以體不滅六染之心相續唯癡滅故六染動相隨滅非心智滅也
