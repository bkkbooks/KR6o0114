body:
  text: 馬鳴菩薩造梁西印土真諦三藏譯明檇李沙門真界纂注復次有四種法熏習義故染法淨法起不斷絶云何為四一者淨法名為真如二者一切染因名為無明三者妄心名為業識四者妄境界所謂六塵熏習義者如世間衣服實無於香若人以香而熏習故則有香氣此亦如是真如淨法實無於染但以無明而熏習故則有染相無明染法實無淨業但以真如而熏習故則有淨用前明染淨生滅必染淨相熏方有染淨生滅但染淨相熏義前未顯示故此廣明即申前生滅中染淨相熏也言淨法者謂真如之體本自清淨離一切相故云淨法然此據本而言但云真如實通相用則妄心亦據本言唯云業識實通五意意識也熏習下引喻以明此亦下以法合顯蓋衣本無香以香熏故衣有香氣真元無相無明熏故真現染相妄無淨用真如熏故妄起淨用是則無明熏真能生粗細一切染相真熏無明能令妄心厭生死苦樂求涅槃生一切淨用也云何熏習起染法不斷所謂以依真如法故有於無明以有無明染法因故即熏習真如以熏習故則有妄心以有妄心即熏習無明不了真如法故不覺念起現妄境界以有妄境界染法緣故即熏習妄心令其念著違種種業受於一切身心等苦此總明妄習展轉資熏生起染法不斷也云何下徵釋妄習熏起染法不斷之義蓋無明無體起必依真故云依真如法有於無明斯即不了真如法一有無明也以依真有染法因故還即熏真以熏真故則有妄心斯由無明資熏真如則不覺動念起業識也以有妄心下謂由妄心資熏無明則重增不了故不覺動念轉成能見而現妄境界以有境界下謂由妄境資熏妄心不了境界無實故於業識轉生事識分別取著造業受報故經云藏識海常住境界風所動種種諸識浪騰躍而轉生是則妄習展轉資熏故令生起一切染法無斷絶也此妄境界熏習義則有二種云何為二一者增長念熏習二者增長取熏習妄心熏習義有二種云何為二一者業識根本熏習能受阿羅漢辟支佛一切菩薩生滅苦故二者增長分別事識熏習能受凡夫業繫苦故無明熏習義有二種云何為二一者根本熏習以能成就業識義故二者所起見愛熏習以能成就分別事識義故此別明妄習資熏生起染法差別也此妄境界下明妄境熏妄心增長念取蓋由妄境資熏妄心以熏習故不了境界無實則於妄心中起諸事識分別取著故云增長念取熏習念即智相相續相取即執取計名字相也妄心熏習下明妄心熏無明受二死苦一者下謂由業識資熏根本無明不了真如無念無相則微細之念及所執法相不亡故令三乘之人受梨耶變易行苦然據三乘合通五意資熏今唯據本但云業識二者下謂由增長分別事識資熏見愛無明不了境界無實則分別執取不亡而起惑造業故令凡夫受業繫分段粗苦言增長分別事識者謂此事識依見愛煩惱增長故也無明熏習下明無明熏真如成五意意識一者下謂由根本無明不了真如法一熏動真如不覺起念成業等五識但今舉初略後故云業識二者下謂由見愛無明不了境界無實熏起真如分別取著故成事識義然此三重即依總中從後向前以別明耳言所起見愛者謂見愛無明由根本所起故也云何熏習起淨法不斷所謂以有真如法故能熏習無明以熏習因緣力故則令妄心厭生死苦樂求涅槃以此妄心有厭求因緣故即熏習真如自信己性知心妄動無前境界修遠離法以如實知無前境界故種種方便起隨順行不取不念乃至久遠熏習力故無明則滅以無明滅故心無有起以無起故境界隨滅以因緣俱滅故心相皆盡名得涅槃成自然業此總明真如展轉資熏生起淨法不斷也云何下徵釋真如熏起淨法不斷之義謂衆生無始不覺一念回光起厭求心良由真如內熏無明故令妄心起成淨用此即本熏也以此妄心下牒上以明新熏即依厭求淨用資熏真如耳言自信己性者謂知真本有十信之信也知心妄動等者謂了自心本自離念有所動者妄有非實故云知心妄動亦復了知無前境界有所見者妄見非實此即達妄本空十住之解也修遠離法者謂依解修行即三資糧所修之行也蓋三賢位人以知前境悉無自性從妄見有如人目翳見毛月等如是知故遂修唯識觀觀法唯識而遠離前境也故頌云唯識無境界以無塵妄見如人目有翳見毛月等事斯則由前厭求淨用資熏真如增其勢力故真如隨淨緣而重發起信解修遠離法也以如實下牒上以明真修謂由地前修遠離法故得如實而知無前境界此牒上也言種種方便等者即地上所修之行謂以知法性無慳貪等故隨順修行檀波羅蜜等雖以種種方便廣修諸度而無所取之相能取之念故云不取不念如是而修至久遠劫無明則滅以無明滅故虗妄心境及與六染皆悉隨滅以妄染皆滅故名得涅槃成自然業斯由稱性而修離能所相久遠熏習之功力故故得無明六染皆亡涅槃體用廓爾現前也妄心熏習義有二種云何為二一者分別事識熏習依諸凡夫二乘人等厭生死苦隨力所能以漸趣向無上道故二者意熏習謂諸菩薩發心勇猛速趣涅槃故此別明妄心熏習進趣之遲速也妄心下舉數徵起一者下明事識熏真趣理之漸謂凡夫二乘不達萬法唯心則法執分別未亡故依分別事識熏真雖以事識熏真既不達唯心則見有生死可厭涅槃可欣故向大菩提疏而漸也二者下明五意熏真趣理之速謂三賢十聖雖了達唯心能如理觀察由未離意故以妄意熏真雖以妄意熏真既達唯心則忘緣內照稱順本性故發心勇猛以發心勇猛故向大涅槃親而速也然不云五意而但言意熏習者以三賢位人進至初地斷相續識則惟餘四意乃至十地惟餘一意以地地不同是故不云五意而但言意熏習也問前以妄熏真則流轉生死何此云依妄熏真速趣涅槃耶答前以順流染用熏故流轉生死此依返流淨用熏故速證涅槃也真如熏習義有二種云何為二一者自體相熏習二者用熏習自體相熏習者從無始世來具無漏法備有不思議業作境界之性依此二義恆常熏習以有力故能令衆生厭生死苦樂求涅槃自信己身有真如法發心修行別明真如體用熏習此先明自體相熏習也真如下舉數徵列言自體相熏習者體謂能具法體相即所具無漏德相及所作境界之相但以體相如珠與光不相捨離故名其體為具無漏法蓋以體具無漏性功德故此則以真如為體功德為相也言備有不思議業者即真如體備內熏作用也於業而言不思議者謂真體無相無明無性無相似無能熏之用無性豈有受熏之能然不妨真能熏妄妄受真熏是則覺力冥熏微妙叵測故云不思議業即下所謂不思議熏也言作境界之性者即真如作一切境界之性故相不異性以相不異性故能熏無明此則以真如為體境界為相依此體相恆熏無明故令衆生發起厭求而生信行矣問曰若如是義者一切衆生悉有真如等皆熏習云何有信無信無量前後差別皆應一時自知有真如法勤修方便等入涅槃答曰真如本一而有無量無邊無明從本已來自性差別厚薄不同故過恆河沙等上煩惱依無明起差別我見愛染煩惱依無明起差別如是一切煩惱依於無明所起前後無量差別唯如來能知故設問答以明真熏平等信解修證之不等也問曰下約真如等熏以難別謂若真如等熏者一切衆生悉有真如等皆熏習則信解行證不應有有無大小邪正等無量不同云何有信無信等無量不同又無量不同皆應一時自知有真如而勤修證入亦不應有前後差別云何又有前後差別然論中所問含此二義但譯人文辭巧略前則舉信而略行證又以無量前後差別句列於中間該通上下致使文義不暢故注補足信解行證而以無量不同前後差別二義上下分開庶無文義壅隔之弊而亦無四法闕略之失也答曰下約惑染不等以通別謂真如本一而無始無明有無量差別厚薄不同故使信解行等亦有無量不同前後差別是則根利惑薄者信解大證入速根鈍惑厚者反此故不能齊等也過恆河沙下明惑染差別之相唯佛能知謂恆沙雖多煩惱猶過其上故云過恆河沙等上此即塵沙惑也我見愛染煩惱即見思惑也如是塵沙見思一切煩惱依於無明所起有前後無量差別此雖聖智難知故唯佛能知也又諸佛法有因有緣因緣具足乃得成辦如木中火性是火正因若無人知不假方便能自燒木無有是處衆生亦爾雖有正因熏習之力若不遇諸佛菩薩善知識等以之為緣能自斷煩惱入涅槃者則無是處若雖有外緣之力而內淨法未有熏習力者亦不能究竟厭生死苦樂求涅槃若因緣具足者所謂自有熏習之力又為諸佛菩薩等慈悲願護故能起厭苦之心信有涅槃修習善根以修善根成熟故則值諸佛菩薩示教利喜乃能進趣向涅槃道此約因緣互闕以通前難也又諸佛下謂衆生為欲成辦佛法須具因緣因緣互闕卒難成辦如木雖具火之正因不假鑽燧方便之緣無能燒木衆生雖有正因熏習若不遇佛及教法緣亦無能斷惑入道縱使衆生有外緣之力而內淨法無熏習力者雖得發心亦不能究竟進修趣證故致信解修證有無量不同前後差別也若自有內因熏習之力又有佛聖悲願冥護之緣自然能起厭苦之心信脫苦法而修習善根以修善根成熟故復值諸佛開示教誨得大利益心生法喜故能進趣向涅槃道用熏習者即是衆生外緣之力如是外緣有無量義略説二種云何為二一者差別緣二者平等緣差別緣者此人依於諸佛菩薩等從初發意始求道時乃至得佛於中若見若念或為眷屬父母諸親或為給使或為知友或為冤家或起四攝乃至一切所作無量行緣以起大悲熏習之力能令衆生增長善根若見若聞得利益故此緣有二種云何為二一者近緣速得度故二者遠緣久遠得度故是近遠二緣分別復有二種云何為二一者增長行緣二者受道緣此依用總標二緣先明差別緣也用熏習下牒指用熏習義如是下舉廣標略云何下徵列二相差別下明差別義謂衆生依於外緣發心求道乃至成佛於其中間若見其身若念其德有無量不同故云差別緣也所言差別者謂佛菩薩觀諸衆生入道之緣各各不同隨所應化而為現身或尊或卑或順或逆或起四攝以至一切所作無量行緣靡不備現故云差別然於差別中無非皆以無作悲智熏習衆生故令衆生增長善根若見若聞而得利益然於佛菩薩本無心無為是以居尊而不高處卑而不下為順而非愛在逆而非冤故知差別在機而不在應也此緣下上明能化作用差別此明能化久近差別蓋所化衆生善根成熟者速疾得度此則能化與衆生作近緣未成熟者久遠得度此則能化與衆生作遠緣又於近遠中若未行者令增長修行未受道者令證道果然則久近等緣亦隨機之差別而於能化亦無差別也平等緣者一切諸佛菩薩皆願度脫一切衆生自然熏習常恆不捨以同體智力故隨應見聞而現作業所謂衆生依於三昧乃得平等見諸佛故此牒釋平等緣也言平等緣者謂諸佛菩薩皆願度脫一切衆生故以同體悲智恆熏不捨以不捨故隨諸衆生於自心中所應見聞而現作用所謂下正釋平等緣義蓋前以所化衆生散心不同故見能化之人亦作用各別此以所化依於三昧則見能化亦無差別故隨衆生於自心中平等見佛是知差別平等咸在於機而不在應也此體用熏習分別復有二種云何為二一者未相應謂凡夫二乘初發意菩薩等以意意識熏習依信力故而能修行未得無分別心與體相應故未得自在業修行與用相應故二者已相應謂法身菩薩得無分別心與諸佛智用相應唯依法力自然修行熏習真如滅無明故此依二力以明體用相應未相應也初三句舉數總徵一者下明未相應謂凡夫二乘及三賢菩薩以妄識熏真而依信力修行故與真如體用未相應也蓋妄識分別信未證真故未得與無分別體相應又妄識有作信未無為則未得無功用道自在修行故與真如智用未相應也二者下明已相應謂法身菩薩得與真如體用相應者以唯依法力任運進修是故得與真如體用相應也蓋真智無別故云法力真行無為故云自然以此智行熏習真如故得滅無明惑而與諸佛體用相應是則初地至七地與真體相應八地之後與智用相應又凡小地前識強智劣法身大士智強識劣故有相應未相應之別非謂地前唯識地上唯智也復次染法從無始已來熏習不斷乃至得佛後則有斷淨法熏習則無有斷盡於未來此義云何以真如法常熏習故妄心則滅法身顯現起用熏習故無有斷此明染淨斷不斷義也復次下明染法無始有終蓋無明染法無始熏真相續不斷從信解行乃至得佛則永斷也言得佛後則有斷者謂無明斷時即得佛故一斷永斷故云後則有斷非謂得佛後方始斷淨法下明淨法無始無終蓋淨法體用從無始來恆常熏習而盡於未來亦無有間斷此義下徵起斷不斷義謂此染法有斷淨法不斷之義云何以真下釋也謂以真如法常熏習故妄心則滅故無明至得佛後則永斷妄心既滅則體顯用現盡未來際恆熏衆生故無有斷也復次真如自體相者一切凡夫聲聞緣覺菩薩諸佛無有增減非前際生非後際滅畢竟常恆從本已來自性滿足一切功德所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨心義故常樂我淨義故清涼不變自在義故具足如是過於恆沙不離不斷不異不思議佛法乃至滿足無有所少義故名為如來藏亦名如來法身此明真如體相以釋立義分中能示摩訶衍自體相也蓋真如之體聖凡平等聖悟不增凡迷不減推之於前無始故非前際生鞠之於後無終故非後際滅以無增減生滅故云畢竟常恆此明真如體也從本下明真如德相謂真如自體本離無明妄見及倒想惑染故故云有大智慧光明義等以窮三際而無改在衆苦而不干處聖凡而莫拘歷九相而非染故云有常樂我淨義又無惑之熱惱無業之遷變無報之繫縛故云有清涼不變自在義如上所具稱性功德量過恆沙難以悉舉故云具足如是等也以恆沙德相不異真體故云不離無始相續故云不斷體相無二故云不異即一性而多相全多相而一性不可以一多定量而思議故云不思議是佛所證故云佛法又一切德相是無上法故云佛法故前文云無上法不空與法界相隨乃至下依淨德滿足之義結名以彰體相不離也謂一切功德既自性滿足無有所少則於自體能含藏無量性德亦能為無量性德所依故名如來藏亦名如來法身然此中正明自性本具無量功德下依業識生滅之相翻染成淨乃就修生以明德相差別也問曰上説真如其體平等離一切相云何復説體有如是種種功德答曰雖實有此諸功德義而無差別之相等同一味唯一真如此義云何以無分別離分別相是故無二設問答以明德相差別即無差別也問曰下指上真如門體絶相義以難德相差別答曰下明德相差別即無差別以通其難蓋真如離相不礙具相德相有相不妨無相以無相故故等同一味唯一真如此義下徵起上義謂此差即無差之義云何以無下釋成上義蓋以德相無相則離能所分別之相是故無二唯一真如故前云離念境界唯證相應也復以何義得説差別以依業識生滅相示此云何示以一切法本來唯心實無於念而有妄心不覺起念見諸境界故説無明心性不起即是大智慧光明義故若心起見則有不見之相心性離見即是遍照法界義故若心有動非真識知無有自性非常非樂非我非淨熱惱衰變則不自在乃至具有過恆沙等妄染之義對此義故心性無動則有過恆沙等諸淨功德相義示現若心有起更見前法可念者則有所少如是淨法無量功德即是一心更無所念是故滿足名為法身如來之藏此依生滅染相差別以彰真如淨德差別也初二句徵問差別所起之由次二句示差別所依之本蓋真如無相以不覺念動現諸染相對妄染故心性不動則起諸淨功德之相是則悟因迷有淨待染成故明差別德相而依業識生滅相示也謂依業識生滅相示云何示耶以一切下釋也然將依動念染相以彰淨德先明無念無相故云諸法唯心實無於念以不覺起念見諸境界故説無明對此義故心性不起離於妄見則無無明故有大智慧光明義也以動心起見有所不見心性離見則無所不見故有遍照法界義也若心有動下依業識總示謂動心知法即是妄想故非真識知動即有染故無有自性乃至具有過恆沙等妄染之相對此相故心性無動則有過恆沙等諸淨功德之相示現是故一切淨功德相皆依業識生滅染相而顯示也若心有起下對有念不足明離念滿足之義結名謂若動心未息更見心外有法可念者則染相未盡故於淨德則有所少此明心法未亡淨德不足也如是淨法無量功德即是一心更不見心外有法而可念求則染相淨盡是故滿足此明能所兩亡淨德滿足也以滿足故則於自體能含藏依止無重功德故名法身如來之藏復次真如用者所謂諸佛如來本在因地發大慈悲修諸波羅蜜攝化衆生立大誓願盡欲度脫等衆生界亦不限劫數盡於未來以取一切衆生如己身故而亦不取衆生相此以何義謂如實知一切衆生及與己身真如平等無別異故以有如是大方便智除滅無明見本法身自然而有不思議業種種之用即與真如等遍一切處又亦無有用相可得何以故謂諸佛如來唯是法身智相之身第一義諦無有世諦境界離於施作但隨衆生見聞得益故説為用此明真如用大以釋立義分中能示摩訶衍用也初一句牒章所謂下先明大用之因即悲智願行等以有如是下明以智破惑證體起用而無用相何以故下徵釋無用所以結大用名蓋如來因地發心務以利生為本故與樂拔苦施之以慈悲攝受教化行之以大行長時度脫堅之以大願能如是化度久而弗倦者以取一切衆生如己身故也雖然而亦不取度衆生相此以何義而不取相以知衆生與己真如平等無別異故斯則於相而離相即資之以大智也既有如是大方便智除滅無明見本法身自然而有不思議用與真如等遍一切處然用雖與體同遍亦無用相可得何以故謂如來唯是法身智相之身離於世諦施作但隨衆生見聞獲益故是則即用無用故説為大用也此用有二種云何為二一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能盡知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身身有無量色色有無量相相有無量好所住依果亦有無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不毀不失如是功德皆因諸波羅蜜等無漏行熏及不思議熏之所成就具足無量樂相故説為報上明因顯果總彰大用此依果明因別明二用也初二句舉數總徵一者下別明二相謂如來無緣妙用若明鏡懸於高臺衆生所見不同如影像隨人妍醜是以凡小不了唯心分別未亡則依事識見佛故見如來應化之相名為應身以不知佛從自己轉識現故見從外來則見如來所現之色而有分齊以見色有分齊故不能盡知無分齊色也菩薩了達唯心情亡分別則依業識見佛名為報身既達唯心則知相唯心現故見依正報體身色相好衆寶莊嚴一一廣多無量一一稱性無量此即隨機示現依正報相無邊無盡無有分齊也非唯依正用相周遍隨機所應亦常能住持不毀不失是則機有大小識有粗細見有優劣故致用有報應亦猶天地之無私由萬物之自私耳如是下牒明報用之因結名謂如上功德報相皆由無漏因行及本覺不思議熏所成以具無量樂相故説為報也又為凡夫所見者是其粗色隨於六道各見不同種種異類非受樂相故説為應復次初發意菩薩等所見者以深信真如法故少分而見知彼色相莊嚴等事無來無去離於分齊唯依心現不離真如然此菩薩猶自分別以未入法身位故若得淨心所見微妙其用轉勝乃至菩薩地盡見之究竟若離業識則無見相以諸佛法身無有彼此色相迭相見故此重明報應之用不同亦顯法身離於用相也又為下明應用不同蓋前明應用雖通凡小由所見差別不分故此重明以分凡聖謂二乘所見之相乃勝應身凡夫隨類名見乃劣應身佛身雖同而所見各別以其非受樂相故説為應也復次下明報用不同蓋前明報用雖通三賢十聖亦所見差別不分故此重明以分優劣謂三賢菩薩雖信解真如法故知彼依正莊嚴之相悉唯心現無來無去亦無分齊然猶未離法執分別未入法身故於如來報用但能少分而見若離法執分別得淨心地則所見微妙其用轉勝乃至十地所見報用最極微妙更無過者故云見之究竟非以無見無相為究竟也若離下明法身離相謂前依業識故見用相優劣天殊此離業識則無見相故唯一法身更無色相可相見也問曰若諸佛法身離於色相者云何能現色相答曰即此法身是色體故能現於色身謂從本已來色心不二以色性即智故色體無形説名智身以智性即色故説名法身遍一切處設問答以明離相不礙現相也問曰下牒上以問謂法身既離色相云何能現報化色相耶答曰下就體以答蓋以法身是報化色相之體隨機大小即無相處見報化相故云能現於色乃機自現耳所謂下約色心不二釋成上義謂色即智故相即無相説名智身智即色故無相即相説名法身遍一切處是則智身無相不礙隨機現相色身有相不妨法身無相則知智身色身二而不二以不二故隨機所見能現色相也所現之色無有分齊隨心能示十方世界無量菩薩無量報身無量莊嚴各各差別皆無分齊而不相妨此非心識分別能知以真如自在用義故此就隨機示現依正莊嚴遍融無礙以結真如大用也初二句總明隨機現相隨心下別明隨機現相言所現之色無有分齊者謂依前法身之所現故無有分齊也言隨心能示等者謂法身離相隨衆生心現報化相故云隨心能示則知應本無心隨機示現也十方世界等即隨機所現依正莊嚴之相雖各各差別以稱同法性故皆無分齊以無分齊故則此依正莊嚴之相各各充遍法界而不相妨是則一多互遍小大相融此是真如自在之用必非衆生心識分別能知故前云不思議業相也復次顯示從生滅門即入真如門所謂推求五陰色之與心六塵境界畢竟無念以心無形相十方求之終不可得如人迷故謂東為西方實不轉衆生亦爾無明迷故謂心為念心實不動若能觀察知心無念即得隨順入真如門故此令觀生滅之本以入真如也上已別明二門此復令觀生滅以入真如者蓋謂若不別明二門則無以開物信解若不觀察生滅則無以悟入真如前解後證法爾如斯論主巧示妙於茲矣然此一文具標釋結復次下標所謂下釋若能下結於釋文中有法喻合所謂下法説如人下喻明衆生下合顯所謂推求五陰等畢竟無念者令於生滅法中以推其本也蓋五陰色心境界即生滅法也念即生滅本也然此令推生滅之本者乃聖人拔本塞源意耳何者謂一切諸法由念而生念若不生諸法自泯故前文云若離心念則無一切境界之相豈非拔本塞源之意哉以心下釋無念所以何以推求五陰等畢竟無念耶以心無形相十方求之終不可得故於諸法推求而畢竟無念也如人下引喻合兩文雖正顯無念意含推求且如迷方者謂東為西而方不轉故則於東求西西不可得喻迷心者謂心為念心實不動故於諸法求念而畢竟無念也若能下謂未觀察者與真違背未離念者不知無念是以推求觀察即得隨順故前云若有衆生能觀無念者則為向佛智也至於念息塵亡於淨心中了無念相是以知心無念入真如矣故前云若離於念名為得入然則知心無念唯離念者方知非餘所知也對治邪執者一切邪執皆依我見若離於我則無邪執是我見有二種云何為二一者人我見二者法我見此依我見總標二執也初一句牒前標章一切下明邪執本蓋以邪執由於邪見而邪見復由於我故云一切邪執皆依我見然執見既依我有若離於我則無邪執矣是我下總標二見言人我見者謂五蘊和合假名為人我者主宰義以不達五蘊之中無實主宰則於蘊中執有實我而復依之妄起邪見名人我見此約初學凡夫未亡人我者言之不就所執而論也言法我見者法謂五蘊等法以不達此無實主宰即執諸法以為實有而復依之起於法見故名法我見也人我見者依諸凡夫説有五種云何為五一者聞修多羅説如來法身畢竟寂寞猶如虗空以不知為破著故即謂虗空是如來性云何對治明虗空相是其妄法體無不實以對色故有是可見相令心生滅以一切色法本來是心實無外色若無色者則無虗空之相所謂一切境界唯心妄起故有若心離於妄動則一切境界滅唯一真心無所不遍此謂如來廣大性智究竟之義非如虗空相故此破執空為性之見也人我下牒數徵起一者下明起執緣謂契經説法身寂寞如虗空者為不知法身寂然無相見佛身色是實有者故云爾也而聞者不達譬喻是破執之説即執虗空是如來性云何下明空相虗妄謂虗空之相因色妄有本無自體亦非真實故云是其妄法體無不實此即總明空相虗妄下即展轉釋成虗妄對破邪執顯如來性何以虗空是妄體無不實耶以對下釋也蓋以虗空對色而有則是妄無體是心緣相故非真實何以對色而有體無不實耶以一下釋也良以色無自性本來是心空既對色而有色本不有空豈可得乎故云若無色者則無虗空之相是知對色有者則體無不實也何以色空俱不可得耶所謂下釋也謂一切境界唯心妄動故有不動則無故不可得妄境既無唯一真心無所不遍此即如來廣大性智究竟之義豈同虗空無知之相者哉則執空為性之見破矣二者聞修多羅説世間諸法畢竟體空乃至涅槃真如之法亦畢竟空本來自空離一切相以不知為破著故即謂真如涅槃之性唯是其空云何對治明真如法身自體不空具足無量性功德故三者聞修多羅説如來之藏無有增減體備一切功德之法以不解故即謂如來之藏有色心法自相差別云何對治以唯依真如義説故因生滅染義示現説差別故此破性空相有之見也二者下明起執緣謂契經説世出世間一切諸法乃至真如涅槃本來自空離一切相者為不知所説假名言相非真執假為實者故云爾也而聞者不達此破執之語即執真如涅槃之性唯是其空云何對治謂真如涅槃等假名言相雖空真如自體及本具性德不空豈可謂假相空而真實之性亦空耶則執性是空之計墮矣三者下明起執緣謂聞契經説如來之藏無有增減體備一切功德之法以不解如來所説差別即無差別故即執藏性之中具有色心差別之相云何對治謂此所説一切功德之法依真如生滅二義説之皆無差別何者若依真如義説則一切法皆真如也故上文云雖實有此諸功德義而無差別之相等同一味唯一真如若因生滅義説則依業識差別相示然雖對妄説有差別而其德相無相故亦無有別既依二義説之俱無差別詎可謂藏性之中而有色心差別之相也哉則執有色心差別之情亡矣四者聞修多羅説一切世間生死染法皆依如來藏而有一切諸法不離真如以不解故謂如來藏自體具有一切世間生死等法云何對治以如來藏從本已來唯有過恆沙等諸淨功德不離不斷不異真如義故以過恆沙等煩惱染法唯是妄有性自本無從無始世來未曾與如來藏相應故若如來藏體有妄法而使證會永息妄者無有是處此破執性有染之見也四者下明起執緣謂聞契經説一切世間生死染法依性而有不離真如以不解如來所説真無自性隨緣成妄妄無自性全體即真故即執藏性之中具有世間生死一切染法云何對治謂如來藏中唯有恆沙功德以順性故不離真如而恆沙煩惱生死染法依無明起唯是妄有性自本無以違性故從無始來未嘗與如來藏相應豈性中而有一切生死染法耶若藏性中有妄法者則妄有自性既有自性而使證理契會永息妄者則無是處也如是則執性有染之見謝矣五者聞修多羅説依如來藏故有生死依如來藏故得涅槃以不解故謂衆生有始以見始故復謂如來所得涅槃有其終盡還作衆生云何對治以如來藏無前際故無明之相亦無有始若説三界外更有衆生始起者即是外道經説又如來藏無有後際諸佛所得涅槃與之相應則無後際故此破始終生滅之見也五者下明起執緣謂聞契經説生死涅槃皆依性有以不解如來所説性與生死二俱無始涅槃與性二俱無終故即執衆生有始以見始故復執如來涅槃有盡還作衆生斯由聞依真有妄之義便謂真先妄後故起始終之見也云何對治謂生死既依如來藏有而如來藏無有前際則無明生死亦無有始矣説三界外有衆生始起者乃外道大有經説也豈如來正教而有此説乎又涅槃亦依如來藏有而如來藏無有後際則如來涅槃亦無後際矣豈如來所得涅槃有其終盡而還作衆生者哉故前云非前際生非後際滅如是則始終之見息矣法我見者依二乘鈍根故如來但為説人無我以説不究竟見有五陰生滅之法怖畏生死妄取涅槃云何對治以五陰法自性不生則無有滅本來涅槃故此破二乘法執之見也法我見下明起執緣謂如來依鈍根二乘但為分別蘊中無我令證人空未明法空則説不究竟故二乘人見五陰生滅之法為實是以怖畏生死妄取涅槃云何對治謂五陰諸法本自不生今亦無滅若是則衆生本來常住入於涅槃而諸法本來常自寂滅亦何得厭有著空而怖畏生死妄取涅槃耶斯則二乘法執之見離矣復次究竟離妄執者當知染法淨法皆悉相待無有自相可説是故一切法從本已來非色非心非智非識非有非無畢竟不可説相而有言説者當知如來善巧方便假以言説引導衆生其旨趣者皆為離念歸於真如以念一切法令心生滅不入實智故明絶待離言假言引入之旨也言究竟離妄執者謂前則隨病設藥對空説有對有説空等雖能離執尚未究竟今則空有雙亡藥病齊遣絶待離言故得究竟離於妄執也當知下謂染不自立對淨以立則染無自相可説淨不自立待染而立則淨亦無自相可説以是染淨皆無自相可説故則一切法亦皆相待而立本非色心有無等故畢竟不可説也蓋謂諸法若有染淨色心等自相可以言説既皆無自相則言説無所施矣所謂口欲談而辭喪心將緣而慮亡故前文云一切諸法從本已來離名字相離言説相又經云諸法寂滅相不可以言宣也或謂法既絶待離言無相可説何如來廣演言教耶而有言説者乃如來方便引導之意故經云以方便力故為五比丘説則其言説之旨趣者欲人即言亡言即念離念以歸真如也何以離念得歸真如耶以念一切法令心生滅不入實智故須離念得歸真如也分別發趣道相者謂一切諸佛所證之道一切菩薩發心修行趣向義故略説發心有三種云何為三一者信成就發心二者解行發心三者證發心信成就發心者依何等人修何等行得信成就堪能發心所謂依不定聚衆生有熏習善根力故信業果報能起十善厭生死苦欲求無上菩提得值諸佛親承供養修行信心經一萬劫信心成就故諸佛菩薩教令發心或以大悲故能自發心或因正法欲滅以護法因緣故能自發心如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應此總標發心三相先明信成就發心也言分別發趣道相者謂道即諸佛所證菩提涅槃發趣即菩薩發心修行趣向蓋前雖顯正治邪若不明發心趣向則有解無行如有目無足豈到前所故今分別發心修行趣向佛道之相令其依解修行到如來地此即明立義分中之乘義也略説下總標發心三相信成就下牒問能修之人所修之行及信成發心所謂下答釋上義明發心因緣謂依信位不定聚人有內外熏習及前世善根之力故信善惡苦樂影響無差由是發起十善厭生死苦求無上覺兼得值佛親承供養如是信心修行經一萬劫而信心成就上皆發心之因以信心成就故諸佛菩薩教令發心此依佛教之緣以發心也或見衆生之苦欲以大悲而救濟故能自發心此依衆生苦緣以發心也或因正法將滅欲護四法久住世故而能自發心此依正法滅緣發心是皆發心之緣然於三緣中隨當一緣即得發心故云或也言護法者所謂擊大法鼓修大法行求大菩提令四法常住名為護法如是下牒上發心結成不退謂經萬劫而信心成就得發心者是由毛心不定以入正定聚矣既入正定聚中則具成佛正因而住不退位故云畢竟不退名住如來種中正因相應也若有衆生善根微少久遠已來煩惱深厚雖值於佛亦得供養然起人天種子或起二乘種子設有求大乘者根則不定若進若退或有供養諸佛未經一萬劫於中遇緣亦有發心所謂見佛色相而發其心或因供養衆僧而發其心或因二乘之人教令發心或學他發心如是等發心悉皆不定遇惡因緣或便退失墮二乘地上依勝機因緣俱勝發心不退此明劣機因緣皆劣發心不定也若有下明發心因劣言善根微少此是德薄煩惱深厚即是垢重如是之人雖值於佛亦得供養或求人天果報或圖息妄趣空設有求大乘者以德薄垢重故若進若退心不決定或有供養諸佛未經一萬劫而於中遇緣亦有發心依何緣發所謂下明發心緣劣或以色見佛或住相供僧或隨劣教或學他迹如是等發心以不達唯識自無深心故悉皆不定何以不定謂遇惡因緣或便退失初心而墮二乘地故悉皆不定也惡緣多種難以定述復次信成就發心者發何等心略説三種云何為三一者直心正念真如法故二者深心樂集一切諸善行故三者大悲心欲拔一切衆生苦故上明能發因緣此明所發之心也復次下牒問所發之心略説下答釋所發之心言直心者不偏之謂也謂正念真如不偏空有生死涅槃諸對待相故斯即二行之本若達此本則修無所修度無所度是為法界之行無漏之因故於三心先明直心也言深心者謂希欲不廣是淺非深以樂修習一切諸善行故名為深心又以所修一一稱性離能所相亦名深心此即自利行本也言大悲心者謂度心不普是小非大以欲救拔一切衆生苦故名為大悲又以悲心化無所化稱性無緣亦名大悲此即利他行本是知信成就人住如來種入正定聚故能發此三種心也問曰上説法界一相佛體無二何故不唯念真如復假求學諸善之行答曰譬如大摩尼寶體性明淨而有礦穢之垢若人雖念寶性不以方便種種磨治終無得淨如是衆生真如之法體性空淨而有無量煩惱垢染若人雖念真如不以方便種種熏修亦無得淨以垢無量遍一切法故修一切善行以為對治若人修行一切善法自然歸順真如法故設問答以明理一惑異須修衆善也問曰上説體相既皆無異唯以直心正念真如足矣何假廣修諸行耶斯則理一何須衆善問答曰下明惑異須修衆善答先以喻明次以法顯謂寶雖淨而垢染若念寶不以方便磨治終無得淨以況性雖淨而惑染唯念性不以方便熏修亦無得淨蓋以垢遍一切須修衆善以為對治如慳以施治亂以定治等能修諸善對破諸垢自然歸順真如是猶寶離垢穢而得顯寶體也略説方便有四種云何為四一者行根本方便謂觀一切法自性無生離於妄見不住生死觀一切法因緣和合業果不失起於大悲修諸福德攝化衆生不住涅槃以隨順法性無住故此依直心修無住方便也言行根本方便者謂觀法無生離於妄見依大智故能斷煩惱超出三界而不住生死此自利行也觀法緣合業果不失依大悲故修諸福德攝化衆生而不住涅槃此利他行也正觀空時萬行沸騰正涉有時一道清淨是則悲智雙運二利齊修恆居生死常處涅槃一無所住故名無住為二行根本故云行根本方便也以隨下謂性本無住由隨順法性修無住行故云以隨順法性無住也二者能止方便謂慚愧悔過能止一切惡法不令增長以隨順法性離諸過故三者發起善根增長方便謂勤供養禮拜三寶讚歎隨喜勸請諸佛以愛敬三寶淳厚心故信得增長乃能志求無上之道又因佛法僧力所護故能銷業障善根不退以隨順法性離癡障故此依深心修止作方便也言能止方便者謂未作之惡慚愧能止已作之惡悔過不增故云慚愧悔過能止一切惡法不令增長以隨下謂性本離過故隨順法性修行方便而遠離諸過也三者下謂未作之善令其發起已作之善俾令增長故云發起善根增長方便何等善根謂勤供養禮拜三寶等以愛敬淳厚心故信得增長故能志求無上之道非唯增信志道又因三寶力護得銷業障而善根不退以隨下謂性本離障故隨順法性修行方便而遠離癡障即是禮拜離我慢障讚歎離謗毀障隨喜離嫉妬障等四者大願平等方便所謂發願盡於未來化度一切衆生使無有餘皆令究竟無餘涅槃以隨順法性無斷絶故法性廣大遍一切衆生平等無二不念彼此究竟寂滅故此依悲心修大願方便也言大願平等方便者謂發願盡於未來化度一切衆生使無有餘此即大願方便亦即長時廣大心也皆令究竟無餘涅槃此即平等方便亦即第一心也以隨下謂法性本無斷絶以隨順法性故發願盡於未來化度衆生而不斷絶此即長時心也法性廣大遍於一切以隨順法性故發願化度一切使無有餘此即廣大心也法性平等無二無有彼此究竟寂滅以隨順法性故發願化度一切皆令究竟無餘涅槃此即第一心也以法性如是故發願度生之心隨順法性亦如是矣菩薩發是心故則得少分見於法身以見法身故隨其願力能現八種利益衆生所謂從兜率天退入胎住胎出胎出家成道轉法輪入於涅槃然是菩薩未名法身以其過去無量世來有漏之業未能決斷隨其所生與微苦相應亦非業繫以有大願自在力故明菩薩示生修短自在也菩薩發是下呈上發願起下示生謂菩薩隨順法性發大願已而得少分見法身者以知衆生與己真如平等無有別異故也由見法身故隨其願力能示從天入胎等八種之相而利益衆生然是初住菩薩故未名法身以其下釋未名法身所以蓋初住留惑潤生則其過去之業未曾決斷隨其示生尚與變易微苦相應故非法身然非衆生業繫粗苦以有下釋非業繫所以蓋菩薩隨願示生修短自在不同衆生為業所繫而不得自在是則雖非法身菩薩亦非衆生業繫也如修多羅中或説有退墮惡趣者非其實退但為初學菩薩未入正位而懈怠者恐怖令彼勇猛故又是菩薩一發心後遠離怯弱畢竟不畏墮二乘地若聞無量無邊阿僧祇劫勤苦難行乃得涅槃亦不怯弱以信知一切法從本已來自涅槃故先引權説次顯實德也蓋發心菩薩既入初住畢竟不退而契經中或説入住有退墮惡趣者但為警進初心懈怠之人令彼恐怖發大勇猛耳豈住位之後而實有所退墮者哉又發心菩薩既見法身了法平等則一切障礙即究竟覺乃至菩薩外道所成就法同是菩提豈怯弱畏墮二乘之地者乎若聞佛道長遠久受勤苦乃得涅槃亦不怯弱何以故以信知一切本來涅槃故不怯弱也解行發心者當知轉勝以是菩薩從初正信已來於第一阿僧祇劫將欲滿故於真如法中深解現前所修離相以知法性體無慳貪故隨順修行檀波羅蜜以知法性無染離五欲過故隨順修行尸波羅蜜以知法性無苦離瞋惱故隨順修行羼提波羅蜜以知法性無身心相離懈怠故隨順修行毗梨耶波羅蜜以知法性常定體無亂故隨順修行禪波羅蜜以知法性體明離無明故隨順修行般若波羅蜜此明解行發心也初二句牒名顯勝謂前則信滿入住此則行滿入向故知轉勝以是下釋解行轉勝所以謂以菩薩從初正信至十回向位鄰初地則於第一無數劫將欲滿故斯則勝前一萬劫也由從初住隨順法性修習四種方便故故得於真如法中深解現前斯則勝前信業果報也由深解現前所修諸度一一離相故云所修離相斯則勝前修行十善也此二句是總明解行以知下別示其相謂知法性體無慳貪等者解也隨順修行檀波羅蜜等者行也蓋以性離諸染順性修之離能所相故一一行皆到彼岸名為解行發心所言發心者前信滿入住發直等三心此由十住以至回向發解行心下由初地以至十地發真等三心也證發心者從淨心地乃至菩薩究竟地證何境界所謂真如以依轉識説為境界而此證者無有境界唯真如智名為法身此明證發心也證發心下牒釋依位所證之理或謂真如無相依何義故而説為境界耶以依轉識説為境界而正證者惟真如智名為法身無有境界也言依轉識説為境界者謂正證之時唯真如智獨存無能所分別之相若後得智以能見心反緣所證以有此能緣心故便有真如影像當情為所緣境界像雖不實還似真如祇據此義説後得智中依於轉識名境界也如人飲水正飲之時不能説其冷暖飲水之後方得説之説時雖不得水體其如所説之水還似所飲之水即所謂變相觀空惟後得也是菩薩於一念頃能至十方無餘世界供養諸佛請轉法輪唯為開導利益衆生不依文字或示超地速成正覺以為怯弱衆生故或説我於無量阿僧祇劫當成佛道以為懈慢衆生故能示如是無數方便不可思議而實菩薩種性根等發心則等所證亦等無有超過之法以一切菩薩皆經三阿僧祇劫故但隨衆生世界不同所見所聞根欲性異故示所行亦有差別明法身菩薩權實之德也是菩薩下明為衆請法德謂菩薩於一念頃能遍帝網剎中而充滿無餘供佛請法其請法意唯為開導利益衆生非求聽受美妙言辭也或示下明延促無礙德謂菩薩或延中示促以為怯弱欲退衆生或促中示延以為懈慢不進衆生非惟只示延促方便以權智廣大故能示如是無數方便不可思議蓋以隨機方便意趣難知以非思量分別之所能解故不可思議也然權示雖有無數差別實則因行所證及與時劫皆悉同等無有超過之法何以無超過法耶以一切菩薩皆經三阿僧祇劫故或謂一切菩薩既皆經三無數劫何故所行亦有差別耶但隨下釋也是知據實無別權示則有無量差別矣又是菩薩發心相者有三種心微細之相云何為三一者真心無分別故二者方便心自然遍行利益衆生故三者業識心微細起滅故又是菩薩功德成滿於色究竟處示一切世間最高大身謂以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益衆生先明發心三相次明究竟德用也言微細之相者謂此三相非下位能知故云微細即所謂難知微細也一者下謂真無分別智能證真如即自利德二者下謂方便有分別智能觀根逗教稱機與益即利他德雖能悲智雙運二利齊修既業識未亡尚有微細生滅故云業識心微細起滅也又是下明菩薩寄位斷惑證智起用謂十地菩薩悲智功圓故於色究竟處示現世間最高大身以究竟始覺智斷最後無明成一切種智也以種智圓滿故自然而起不思議用周遍十方利益衆生蓋以第十地菩薩寄位升進正當此天故於是中現高大身而成等正覺也問曰虗空無邊故世界無邊世界無邊故衆生無邊衆生無邊故心行差別亦復無邊如是境界不可分齊難知難解若無明斷無有心想云何能了名一切種智答曰一切境界本來一心離於想念以衆生妄見境界故心有分齊以妄起想念不稱法性故不能了諸佛如來離於見相無所不遍心真實故即是諸法之性自體顯照一切妄法有大智用無量方便隨諸衆生所應得解皆能開示種種法義是故得名一切種智設問答以顯離念得名種智也問曰下謂虗空世界衆生心行各各無邊無有分齊縱有心想尚難知解若無明斷無有心想云何能了名一切種智耶斯則無念何名種智問答曰下明離念得名種智答謂法本一心離於想念以衆生動心未息妄見境界則心有分齊以妄起想念不稱法性故不能了而如來動心既息離於見相則心無不遍以無想念得心真實則稱合法性以性照法有大智用自然了知一切心行而以無量方便隨諸衆生所應得解開示法義是故得名一切種智也又問曰若諸佛有自然業能現一切處利益衆生者一切衆生若見其身若覩神變若聞其説無不得利云何世間多不能見答曰諸佛如來法身平等遍一切處無有作意故説自然但依衆生心現衆生心者猶如於鏡鏡若有垢色像不現如是衆生心若有垢法身不現故設問答以明用唯心現也問若諸佛有自然業用充遍一切處者則聞言覩相無不獲益云何世間而多不見耶答如來法身妙用等遍一切無有作意故説自然但依衆生心現衆生心下約法喻顯鏡喻機心像喻業用謂鏡若有垢色像不現以況衆生心若有垢用則不現是則衆生不見法身妙用當責於心勿責於佛也然上文為善根成熟信滿入住之機分別發趣道相矣自下為善根微少修信未滿之機重説修行信心使其信滿入住還依發趣道相以登正覺也已説解釋分次説修行信心分是中依未入正定聚衆生故説修行信心何等信心云何修行略説信心有四種云何為四一者信根本所謂樂念真如法故二者信佛有無量功德常念親近供養恭敬發起善根願求一切智故三者信法有大利益常念修行諸波羅蜜故四者信僧能正修行自利利他常樂親近諸菩薩衆求學如實行故修行有五門能成此信云何為五一者施門二者戒門三者忍門四者進門五者止觀門此依前劣機以明信行也初二句結前生後是中下明起説緣謂此中正為修信未滿發心不定之機而説四信五行故云依未入正定聚衆生説修行信心也何等下問信行相略説下先明四信言信根本者謂真如是萬法之根二行之本若信樂正念真如則不住空有能所一切諸對待相故於四信先令信根本也二令信佛有無量功德當常樂念供養恭敬求一切智此信報佛三令信法有大利益常當樂念修行諸度此信教行二法四令信僧能行二利應常親近求如實行此信大菩薩僧是知四信非令空信故一一皆云樂念求學修行也言修行五門能成此信者謂信而不行是空信矣有信無行信亦不堅不堅之信遇緣便退故令修五行以成四信也云何下徵列五門云何修行施門若見一切來求索者所有財物隨力施與以自捨慳貪令彼歡喜若見厄難恐怖危逼隨己堪任施與無畏若有衆生來求法者隨己能解方便為説不應貪求名利恭敬唯念自利利他回向菩提故云何修行戒門所謂不殺不盜不淫不兩舌不惡口不妄言不綺語遠離貪嫉欺詐諂曲瞋恚邪見若出家者為折伏煩惱故亦應遠離憒閙常處寂靜修習少欲知足頭陀等行乃至小罪心生怖畏慙愧改悔不得輕於如來所制禁戒當護譏嫌不令衆生妄起過罪故此徵釋施戒之相也先徵釋施相施有三種初令修資生施若見下令行無畏施若有下令行法施云何下徵釋戒相謂不殺不盜等斷三業之惡即令修攝律儀戒若出家下教離憒處靜修少欲知足抖擻等行而折伏煩惱即令修攝善法戒乃至下明護戒相即令修攝衆生戒蓋以自護戒相亦護衆生不令譏嫌妄起過罪故名攝衆生戒也云何修行忍門所謂應忍他人之惱心不懷報亦當忍於利衰毀譽稱譏苦樂等法故云何修行進門所謂於諸善事心不懈退立志堅強遠離怯弱當念過去久遠已來虗受一切身心大苦無有利益是故應勤修諸功德自利利他速離衆苦復次若人雖修行信心以從先世來多有重罪惡業障故為邪魔諸鬼之所惱亂或為世間事務種種牽纏或為病苦所惱有如是等衆多障礙是故應當勇猛精勤晝夜六時禮拜諸佛誠心懺悔勸請隨喜回向菩提常不休廢得免諸障善根增長故此徵釋忍進之相也先徵釋忍相初忍逆境亦當下通忍逆順所言利衰等者謂得財名利失財名衰談惡為毀談善為譽對面談善曰稱對面談惡曰譏逼迫為苦適悅為樂是則於利譽稱樂忍之不喜衰毀譏苦忍之不瞋二四合説以成八風謂之風者能擊衆生心海起貪瞋煩惱浪故今令忍之則八風不能動矣云何下徵釋進相先令進修諸善勇猛勿懈當念下令思惟䇿進修善無疲故無性頌云汝已惡道經多劫無利勤苦尚能超少行苦行得菩提大利不應生退屈此亦䇿進之意也復次下對障重之機明禮懺方便以釋進相先舉衆多障礙是故下令勇猛精進修禮懺法銷滅諸障而增長善根也云何修行止觀門所言止者謂止一切境界相隨順奢摩他觀義故所言觀者謂分別因緣生滅相隨順毗鉢舍那觀義故云何隨順以此二義漸漸修習不相捨離雙現前故此徵釋止觀之相也然止觀不分合為一門者意令止觀雙修也所言止者謂觀察諸法從緣而生俱無自性唯是一心如是而觀自然於法無住久久不息則外境自亡內心亦寂是則心境俱空聖凡齊泯故云止一切境界相此依真如門體絶相義以修止也言隨順奢摩他觀義故者釋成止義即隨順空觀耳蓋以天台三止其體真止即是空觀故下文云隨順觀察又云智慧觀察皆止義也所言觀者謂雖觀諸法自性無生而復即觀因緣和合業果不失故廣修諸善廣化衆生如是則染淨齊彰心境俱現故云分別生滅因緣相此依生滅門隨緣起滅義以修觀也言隨順毗鉢舍那觀義故者釋成觀義即隨順假觀也云何下徵釋方便以顯正觀謂依二門修習止觀何云隨順耶蓋以初修雖止觀不相捨離而未淳熟不能雙現故名隨順久習淳熟止觀雙現即名正觀是知初習未成名為隨順方便成就雙現是為正觀相應也若修止者住於靜處端坐正意不依氣息不依形色不依於空不依地水火風乃至不依見聞覺知一切諸想隨念皆除亦遣除想以一切法本來無想念念不生念念不滅亦不得隨心外念境界後以心除心心若馳散即當攝來住於正念是正念者當知唯心無外境界即復此心亦無自相念念不可得此令依靜坐以修止也初二句明修止外緣處緣既靜次宜正身端坐勿曲勿聳不左右側然後齋心正意勿使外緣故云端坐正意言不依氣息等者謂此中唯依真如絶相義修體真止故不依氣息形色等及一切諸想隨念皆除除想亦遣何也以一切法本離心緣生滅相故亦不得下謂非惟不依氣息形色及一切諸想亦不得隨心外念境界後以心除心心若馳散即當攝歸正念斯言念起即攝不得隨心外緣而後攝也是正念下正示體絶相義令依之修止謂當了知萬法唯心心外無法即復此心亦無自相可得如是了知依而進修是為體真止也若從坐起去來進止有所施作於一切時常念方便隨順觀察久習淳熟其心得住以心住故漸漸猛利隨順得入真如三昧深伏煩惱信心增長速成不退唯除疑惑不信誹謗重罪業障我慢懈怠如是等人所不能入此令依餘緣以修止也若從下謂從坐起行住之間二六時中有所施作常應正念修止方便觀察唯心久習淳熟能令妄念不流故云其心得住以心住故心漸猛利故隨順得入真如三昧深伏煩惱而信增不退唯除下上明修止得入此明障者不能也復次依是三昧故則知法界一相謂一切諸佛法身與衆生身平等無二即名一行三昧當知真如是三昧根本若人修行漸漸能生無量三昧或有衆生無善根力則為諸魔外道鬼神之所惑亂若於坐中現形恐怖或現端正男女等相當念唯心境界則滅終不為惱先顯修止勝能次略舉魔事以明對治相也言依三昧則知法界一相者謂由前止觀察唯心得入真如三昧故能知法界一相也言知一相者謂知諸佛法身與衆生身平等無二也由知平等無二故則心不異緣故即名一行三昧故文殊般若經云何名一行三昧佛言法界一相繫緣法界是名一行三昧當知下顯三昧能生蓋以真如是三昧根本故依而修之漸漸能生無量三昧或有下略舉定中所現魔事蓋衆生善根深厚則於定中自然不為諸魔外道等惱亂以無善根力故則為其所惑亂也云何惑亂或現可畏之身怖之以失志或現可愛之色惑之以生染等當念下明對治相謂一切諸境尚惟自心何況坐中所現諸境是故觀察唯心魔境隨滅終不為惱蓋此唯心乃通遣之法故也或現天像菩薩像亦作如來像相好具足若説陀羅尼若説布施持戒忍辱精進禪定智慧或説平等空無相無願無怨無親無因無果畢竟空寂是真涅槃或令人知宿命過去之事亦知未來之事得他心智辨才無礙能令衆生貪著世間名利之事又令使人數瞋數喜性無常準或多慈愛多睡多病其心懈怠或卒起精進後便休廢生於不信多疑多慮或捨本勝行更修雜業若著世事種種牽纏亦能使人得諸三昧少分相似皆是外道所得非真三昧或復令人若一日若二日若三日乃至七日住於定中得自然香美飲食身心適悅不飢不渴使人愛著或令人食無分齊乍多乍少顏色變異以是義故行者常應智慧觀察勿令此心墮於邪網當勤正念不取不著則能遠離是諸業障此廣舉魔事以明對治相也言魔事者謂或現身相以説法或令得三昧神通或令心性行事無常或令貪著世間名利或令定中得食身心愛著或令食無一定色變不常以如是衆多義故行者常應智慧觀察言觀察者謂觀諸境俱無自性從妄想有畢竟是空以如是觀則魔境自滅故不墮於魔網也亦當正念了境唯心則魔界佛界同一真如自然不取不著故能遠離衆多業障也應如外道所有三昧皆不離見愛我慢之心貪著世間名利恭敬故真如三昧者不住見相不住得相乃至出定亦無懈慢所有煩惱漸漸微薄若諸凡夫不習此三昧法得入如來種性無有是處以修世間諸禪三昧多起味著依於我見繫屬三界與外道共若離善知識所護則起外道見故此對偽顯真以勸修正定也應知下明邪定多染真如下明正定離相謂邪不離見而真不住見邪有所愛真無所得邪有我慢真無懈慢邪定則貪著濃厚正定則煩惱漸薄一一翻對真偽昭然若人不習此真如三昧而得入如來種性者未之有也何者以修世間諸禪三昧依於我見多起味著繫屬三界與外道共若離知識所護則起外道之見故必修真如三昧方乃得入如來種性也復次精勤專心修學此三昧者現世當得十種利益云何為十一者常為十方諸佛菩薩之所護念二者不為諸魔惡鬼所能恐怖三者不為九十五種外道鬼神之所惑亂四者遠離誹謗甚深之法重罪業障漸漸微薄五者滅一切疑諸惡覺觀六者於諸如來境界信得增長七者遠離憂悔於生死中勇猛不怯八者其心柔和捨於驕慢不為他人所惱九者雖未得定於一切時一切境界處則能減損煩惱不樂世間十者若得三昧不為外緣一切音聲之所驚動此明修止所得之益也言修學三昧為佛菩薩所護念者謂此三昧是諸佛菩薩修證根本故修學之者常為佛菩薩所護念也以能了法唯心不取不著故不為諸魔外道等之所惑亂能契悟深理斷相續心故得不謗深法而薄罪業障由深信真如心離分別故能斷諸疑惑滅惡覺觀而信得增長又能達法無生心離憂悔故於生死中勇猛不怯了法平等心離驕慢故不為他人所惱離諸愛染不著世樂故能減損煩惱不樂世間深入三昧不逐世緣故不為外緣之所驚動也復次若人唯修於止則心沈沒或起懈怠不樂衆善遠離大悲是故修觀修習觀者當觀一切世間有為之法無得久停須臾變壞一切心行念念生滅以是故苦應觀過去所念諸法恍惚如夢應觀現在所念諸法猶如電光應觀未來所念諸法猶如於雲欻爾而起應觀世間一切有身悉皆不淨種種穢汙無一可樂此舉偏修之失而勸修四觀也蓋止觀二法必須雙修若唯修止恐心沈沒懈於二利故勸修觀修習下令觀有為無常故云有為之法無得久停須臾變壞一切下令觀心是苦故云念念生滅以是故苦應觀下令觀三世所念之法如夢如電亦猶於雲畢竟皆空令觀有身悉皆不淨無一可樂作是觀已自然心不沈沒而修行衆善發起利生也如是當念一切衆生從無始時來皆因無明所熏習故令心生滅已受一切身心大苦現在即有無量逼迫未來所苦亦無分齊難捨難離而不覺知衆生如是甚為可愍作是思惟即應勇猛立大誓願願令我心離分別故遍於十方修行一切諸善功德盡其未來以無量方便救拔一切苦惱衆生令得涅槃第一義樂以起如是願故於一切時一切處所有衆善隨己堪能不捨修學心無懈怠唯除坐時專念於止若餘一切悉當觀察應作不應作此勸思物苦令發悲願以修衆善也如是下牒上令思物苦謂既觀無常苦空不淨已又當思念衆生為無始無明所熏令心生滅故受諸大苦然衆生於三世中雖受苦無量無有邊際而不覺知誠為可愍是故應當發廣大願以救拔之言願令我心離分別者令發直心即不顛倒心也遍於下令發深心即廣大心盡未來下令發悲心即長時心令得下即發第一心以起下牒上大願結勸進修故云唯除坐時專念於止餘行住時悉當觀察應作不應作也若行若住若臥若起皆應止觀俱行所謂雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞雖念因緣善惡業報而亦即念性不可得若修止者對治凡夫住著世間能捨二乘怯弱之見若修觀者對治二乘不起大悲愜劣心過遠離凡夫不修善根以是義故是止觀門共相助成不相捨離若止觀不具則無能入菩提之道此勸依四儀圓修止觀也若行下依四威儀標止觀行所謂下釋止觀俱行之相以即止而觀故雖觀諸法自性無生而復即觀因緣和合業果不失故廣修諸善攝化衆生無修而修也以即觀而止故雖觀緣合廣修衆善而不妨能所兩亡二利齊泯修無所修斯則約修以明止觀也若修下約對治以明止觀蓋凡夫由不達諸法無生而貪著世間二乘由不了無生則怯畏生死故今示即觀之止令凡夫修之不著世間二乘修之不怯生死故云對治凡夫住著世間能捨二乘怯弱之見也若修觀者下亦治二過謂治二乘愜劣之心令普觀衆生起於大悲亦治凡夫懈怠之習令觀無常等䇿修善行故云對治二乘不起大悲遠離凡夫不修善根也以是下牒上結成俱相以是止觀能治凡夫二乘諸心過故則知止觀共相助成而不相捨離矣蓋以止助觀觀不離止則不住生死以觀助止止不離觀則不住涅槃既而止觀俱行不住生死涅槃則能究竟無上菩提反此則止觀不具故無能入菩提之道也復次衆生初學是法欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道如修多羅説若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生住正定故此為怯退之機以示專念方便也復次下明怯退意當知下標指攝護方便如修多羅下引經證成若觀下對專念顯勝言初學是法等者謂是法通指前五門法以修此五門能成四信故云欲求正信言其心怯弱等者謂衆生於生死中創起覺悟惑業則無始積集善行則方將修學境強心弱障重力微在於修心寧無怯懼況娑婆世間不常值佛既不值佛法豈得聞如是則苦輪易就正信難成故意欲退也如來為是等輩即以專念方便而攝護之令其專意念佛隨願得生他方佛土永離惡道既生佛土則常得值佛故終無有退此即十信不退也若觀下謂前唯專念此兼理觀理觀則勝前專念故勤而修之畢竟得生住於正定而入十住不退矣正宗文竟下乃流通分也已説修行信心分次説勸修利益分如是摩訶衍諸佛祕藏我已總説若有衆生欲於如來甚深境界得生正信遠離誹謗入大乘道當持此論思量修習究竟得至無上之道若人聞是法已不生怯弱當知此人定紹佛種必為諸佛之所授記假使有人能化三千大千世界滿中衆生令行十善不如有人於一食頃正思此法過前功德不可為喻復次若人受持此論觀察修行若一日一夜所有功德無量無邊不可得説假令十方一切諸佛各於無量無邊阿僧祇劫歎其功德亦不能盡何以故謂法性功德無有盡故此人功德亦復如是無有邊際此為懈慢不進之機舉益以勸修也初二句結前生後如是下牒結前説若有下總顯三慧之益蓋此論所明一心二門三大等旨乃諸佛所證甚深境界故欲正信離謗究竟無上道者當持此論思量修習也若人下別顯聞慧之益謂論所明理乃諸佛成道之本則聞而不怯者當紹佛種故為諸佛之所授記也假使下舉化人之功別顯思慧之益謂化人行善是有漏善食頃思法乃無漏因如是則思法之德超化人之功甚多故不可為喻也復次下別顯修慧之益謂依此論修雖一日夜以稱性故則功無邊量豈可得説是以諸佛於無量無數劫歎之亦不能盡也何以故下釋歎不能盡所以蓋法性功德無有盡故修行功德亦無邊際故歎不能盡矣其有衆生於此論中毀謗不信所獲罪報經無量劫受大苦惱是故衆生但應仰信不應毀謗以深自害亦害他人斷絶一切三寶之種以一切如來皆依此法得涅槃故一切菩薩因之修行得入佛智故當知過去菩薩已依此法得成淨信現在菩薩今依此法得成淨信未來菩薩當依此法得成淨信是故衆生應勤修學此舉謗毀之罪而結信勸修也其有下舉不信罪苦勸信誡謗以一切下釋斷絶三寶所以蓋此論所詮乃三寶種性衆生法身諸佛依此而得涅槃菩薩因之得入佛智故謗毀不信則是斷三寶種性毀佛涅槃非惟自害亦害他人故所獲罪報經無量劫而受大苦惱也當知下結信勸修謂三世菩薩既皆依此法得成淨信是故衆生亦應依此而修學也諸佛甚深廣大義我今隨順總持説回此功德如法性普利一切衆生界此總結回向也前二句總結所説謂此略論乃隨順如來所説深廣之義而以少言辭總攝集之故云甚深大義隨順總説也後二句回造論之功而向衆生蓋菩薩本為衆生除疑捨執起大乘信而離苦得樂故造斯論是以論成即願造論之功稱同法性普向一切衆生令其見者聞者各各信解修行而證入真如三昧以究竟無餘涅槃也昔密藏開公始創刻藏道場於清涼妙德余嘗駐錫其間因與二三法侶講斯論記而開公亦預焉每至隱奧乖隔處公即為諸學衆設難問辨委曲搜揚講甫畢公啓余曰斯論文辭簡要義理宏深誠諸大乘經之關鍵也但分文析義科節太繁加以疏記未合恐披覽者難為融會子能去繁就簡融合疏記如楞嚴纂注而纂集之豈不幸甚余遽對曰此勝舉也但愧才識暗短操文不工自非勉力為之則有辜雅意纂注其容己乎未幾刻藏道場南遷雙徑而余亦寄迹於茲每禪誦之隙即遊神斯典研窮反復頗得其端由是分章釋義録實芟繁融貫論文會通疏記三經寒暑注藁始成非敢刻木流通將以自備觀覽適抱石雲公孝若茅君見而心喜慨然捐資欲以梓行余因嘉緇素樂法之誠遂授梓以就正諸方也萬歷己亥孟夏望日寓雙徑沙門真界謹跋
